# Settings for the platform. The top block is passed in by the root app (from
# config.yaml.gotmpl); the defaults here are placeholders so the chart renders on its
# own with `helm template ./argocd`.
domain: example.com
acmeEmail: admin@example.com
ingressClass: traefik
clusterIssuer: letsencrypt-prod
gitRepoURL: https://github.com/adomi-io/kubernetes-provisioner.git
gitTargetRevision: main

# Where each off-the-shelf component comes from, pinned to a version. The pieces
# that live in this repo (cluster-issuers, cluster-secrets, rabbitmq) use
# gitRepoURL instead.
charts:
  certManager:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    version: v1.20.2
  traefik:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    version: 40.2.0
  cloudnativePg:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    version: 0.28.2
  authentik:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    version: 2026.5.3
  argoWorkflows:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    version: 1.0.14
  argoEvents:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-events
    version: 2.4.21
  externalSecrets:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    version: 2.5.0
  juicefsCsiDriver:
    repoURL: https://juicedata.github.io/charts/
    chart: juicefs-csi-driver
    version: 0.31.8
  openbao:
    repoURL: https://openbao.github.io/openbao-helm
    chart: openbao
    version: 0.28.3
  seaweedfs:
    repoURL: https://seaweedfs.github.io/seaweedfs/helm
    chart: seaweedfs
    version: 4.31.0
  odoo:
    repoURL: https://github.com/adomi-io/adomi-helm.git
    path: charts/odoo
    targetRevision: master
  kubePrometheusStack:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    version: 86.2.3
  loki:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: loki
    version: 17.4.0
  alloy:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    version: 1.10.0
  tempo:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: tempo
    version: 2.2.3
  forgejo:
    repoURL: code.forgejo.org/forgejo-helm
    chart: forgejo
    version: 17.1.1
  harbor:
    repoURL: https://helm.goharbor.io
    chart: harbor
    version: 1.19.1
  outline:
    repoURL: https://community-charts.github.io/helm-charts
    chart: outline
    version: 0.8.1
  # The per-app superset chart stays here for the application-catalog (per-client
  # deployments); the cluster-wide superset app itself is retired.
  superset:
    repoURL: https://github.com/adomi-io/adomi-helm.git
    path: charts/superset
    targetRevision: master
  litellm:
    repoURL: ghcr.io/berriai
    chart: litellm-helm
    version: 1.88.0

# OpenBao connection + paths. Set at bootstrap from config.yaml.gotmpl (the BAO_*
# env vars); the README covers the OpenBao side (auth, policy, secrets).
openbao:
  # Unseal: "kubernetes" (default, self-managed) or "kms" (cloud KMS).
  unsealMode: kubernetes
  address: http://openbao.openbao.svc.cluster.local:8200
  kvMount: secret
  kubernetesAuthMountPath: kubernetes
  kubernetesAuthRole: external-secrets
  authentikSecretPath: authentik
  argoWorkflowsSecretPath: argo-workflows
  # OpenBao path holding the Forgejo service-account credentials (properties
  # `token` + `username`) used by Argo CD (SCM generator + repo creds), the platform
  # API, and the Odoo portal to read/write client repos. The token is a real Forgejo
  # API token (it can't be a random secret), minted automatically by openbao-bootstrap
  # once Forgejo is up - see the `forgejoMint` wiring in the openbao-bootstrap app.
  # Kept on its OWN path, distinct from secret/forgejo (the SSO OAuth client creds
  # the platform controller owns) so the two never collide.
  forgejoSecretPath: forgejo-scm
  # OpenBao path for Forgejo's local admin password (a random secret seeded below).
  # openbao-bootstrap logs in with it in-cluster to mint the service-account token;
  # cluster-secrets/app-databases also delivers it to Forgejo's admin-init job.
  forgejoAdminSecretPath: forgejo-admin
  # Fixed username for that local admin (the account that owns the minted token).
  forgejoAdminUser: adomi-admin
  # Stable app secrets openbao-bootstrap generates once (only if absent), as a
  # space-separated list of "path:key1,key2". These back the boot secrets that
  # charts otherwise default to insecure or regenerate on every sync (Outline's
  # SECRET_KEY/UTILS_SECRET, Odoo's master password, Grafana's admin password,
  # Superset's secret key). External Secrets delivers them into each namespace.
  appSecrets: "outline-app:secret-key,utils-secret grafana-admin:admin-password harbor-app:admin-password litellm-app:masterkey management-app:admin-password adomi-ingest:token adomi-platform-api:api-token forgejo-admin:password forgejo-webhook:secret"
  # OpenBao path holding the shared HMAC secret Forgejo signs push webhooks with
  # (seeded once via appSecrets above). Delivered by app-databases to Argo CD
  # (webhook.gogs.secret dereferences it) and to the portal (payload verification).
  forgejoWebhookSecretPath: forgejo-webhook
  # Auto-unseal (kms mode): base64 HCL seal stanza + a service-account annotation.
  sealConfig: ""
  serviceAccountAnnotationKey: ""
  serviceAccountAnnotationValue: ""

# Per-customer GitOps (workstream 3.1). Client repos live in the Forgejo `forgejoOrg`
# (one repo per Client, named after the slug); the `clients` ApplicationSet discovers
# them and bootstraps an AppProject + root Application each. Argo CD and the SCM
# generator reach Forgejo over the in-cluster Service (the public ingress is gated by
# Authentik forward-auth), so clone URLs are built from forgejoCloneBase.
clients:
  enabled: true
  forgejoOrg: clients
  forgejoApi: http://forgejo-http.forgejo.svc.cluster.local:3000
  forgejoCloneBase: http://forgejo-http.forgejo.svc.cluster.local:3000/clients
  forgejoInsecure: false
  targetRevision: main
  # Must match the Odoo addon's adomi_platform.client_namespace_prefix.
  clientNamespacePrefix: adomi-client-
  # Forgejo usernames with read access to every client infra repo (the org and
  # repos stay private; access flows through the org's reconciled staff team).
  staffUsers:
    - akadmin
  # Push fan-out: org-level webhooks openbao-bootstrap keeps on the client org.
  # Argo CD re-fetches the pushed repo immediately (instead of the ~3 min poll);
  # the portal re-syncs the pushed client's state. Both verify the shared HMAC
  # secret at openbao.forgejoWebhookSecretPath.
  webhooks:
    argocd: http://argo-cd-argocd-server.argocd.svc/api/webhook
    portal: http://adomi-platform-management.adomi-platform-management.svc:8069/adomi_platform/webhook/forgejo

authentik:
  address: http://authentik-server.authentik.svc.cluster.local
  authorizationFlowSlug: default-provider-authorization-implicit-consent
  invalidationFlowSlug: default-provider-invalidation-flow
  signingKeyName: authentik Self-signed Certificate
platformController:
  repoURL: https://github.com/adomi-io/adomi-platform-controller.git
  targetRevision: master
  image:
    repository: ghcr.io/adomi-io/adomi-platform-controller
    # Pin the CI-published immutable sha-<commit> tag. The node resolves the
    # mutable appVersion tag (0.7.0) to a STALE cached manifest even with
    # imagePullPolicy Always, so redeploys silently kept old code — immutable
    # tags are the only reliable rollout on this cluster (and true GitOps:
    # bump this to ship a new controller).
    tag: "sha-822046219e70f766702f7b1d967ca3fb28f009e9"
# The front-door API (adomi_platform_api): end users (via Odoo / the CLI / partner
# UIs) POST resource intent here and it commits to each customer's client repo in
# Forgejo. It ships from the platform-controller repo (the control plane: API +
# operator share one schema); its chart lives there too. Image built from
# Dockerfile.api. Enabled with the per-customer GitOps flow (clients.enabled).
platformApi:
  repoURL: https://github.com/adomi-io/adomi-platform-controller.git
  targetRevision: master
  path: charts/adomi-platform-api
  image:
    repository: ghcr.io/adomi-io/adomi-platform-api
    tag: ""
# The Odoo management portal (adomi-platform-management). Deployed via the
# adomi-helm odoo chart, installing the adomi_platform module on boot.
platformManagement:
  image:
    repository: ghcr.io/adomi-io/adomi-platform-management
    # Not a 19.0-style tag, so set it explicitly (the image is tagged latest/<sha>).
    tag: latest
authentikDb:
  instances: 1
  storageSize: 8Gi
  backup:
    enabled: true
    retention: "30d"
    schedule: "0 0 3 * * *"
argoEvents:
  eventBus:
    jetstreamVersion: "2.10.10"
    replicas: 1

# Object storage - the in-cluster SeaweedFS, or an external bucket if you repoint it.
s3:
  endpoint: http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333
  bucket: platform
  secretPath: s3
  extraBuckets:
    - loki
    - tempo
    - harbor
    - outline

# Per-app Postgres clusters (CloudNativePG), one per stateful component, created by
# the app-databases app. Same shape as authentikDb: backups stream to the object
# store under s3://<bucket>/<cluster>. The list of databases/namespaces lives in
# charts/app-databases/values.yaml; these are the shared knobs.
appDatabases:
  instances: 1
  storageSize: 8Gi
  backup:
    enabled: true
    retention: "30d"
    schedule: "0 0 3 * * *"
