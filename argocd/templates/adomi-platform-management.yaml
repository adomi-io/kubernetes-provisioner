# The Adomi platform management portal: an Odoo instance (image
# adomi-platform-management) deployed via the adomi-helm odoo chart, with the
# adomi_platform module installed on boot. Its ServiceAccount is granted the
# platform.adomi.io RBAC by platform-resources (wave 6). Auth is Odoo's own login
# (not the platform forward-auth). Lives at platform.<domain>.
#
# Wave 7 - after the controller + CRDs (wave 5), the catalog (wave 6) and its DB +
# admin secret (app-databases, wave 5).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adomi-platform-management
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.odoo.repoURL | quote }}
    targetRevision: {{ .Values.charts.odoo.targetRevision | quote }}
    path: {{ .Values.charts.odoo.path | quote }}
    helm:
      valuesObject:
        # Name every resource (Deployment, Service, Ingress, PVC) plainly after the
        # portal rather than the odoo chart's default <release>-odoo, so the Service
        # DNS is adomi-platform-management.adomi-platform-management.svc.
        fullnameOverride: adomi-platform-management
        image:
          repository: {{ .Values.platformManagement.image.repository | quote }}
          tag: {{ .Values.platformManagement.image.tag | quote }}
          # With a mutable tag (latest), always re-pull so a rollout picks up the
          # newest image. Pin tag to a commit SHA for true GitOps rollouts.
          pullPolicy: Always
        serviceAccount:
          create: true
          name: adomi-platform-management
        odoo:
          proxyMode: true
          withoutDemo: true
          # Multi-worker (Odoo production mode): the gevent worker serves the
          # websocket/longpolling port 8072 the ingress routes /websocket to —
          # with workers=0 that port is dead and live status pushes never reach
          # open browser tabs.
          workers: 2
          # The portal sits behind OIDC; don't expose the database manager.
          listDb: false
          # Install the addon on first boot, and upgrade it every boot so a new
          # image actually applies model/view/security changes to the database.
          initModules: adomi_platform
          updateModules: adomi_platform
        # The odoo chart is a pure 12-factor consumer (capabilities model): the DB
        # connection and every secret are wired explicitly via env. The database is
        # the standalone CloudNativePG management-db; secrets come from OpenBao via
        # ExternalSecrets (app-databases / cluster-secrets).
        env:
          - name: ODOO_DB_HOST
            value: management-db-rw
          - name: ODOO_DB_PORT
            value: "5432"
          - name: ODOO_DB_USER
            value: odoo
          - name: ODOO_DB_NAME
            value: odoo
          - name: ODOO_DB_SSLMODE
            value: require
          - name: ODOO_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: management-db-app
                key: password
          - name: ODOO_ADMIN_PASSWD
            valueFrom:
              secretKeyRef:
                name: management-admin
                key: admin-password
          # Shared bearer token the platform controller authenticates its status
          # pushes with (must match the controller's ODOO_NOTIFY token).
          - name: ADOMI_INGEST_TOKEN
            valueFrom:
              secretKeyRef:
                name: adomi-ingest
                key: token
          # OIDC sign-in against Authentik. The management-sso Secret is published by
          # the controller from the SSOApplication; optional so the pod still starts
          # if SSO hasn't reconciled yet (the addon skips seeding until creds exist).
          - name: ADOMI_OIDC_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: management-sso
                key: client-id
                optional: true
          - name: ADOMI_OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: management-sso
                key: client-secret
                optional: true
          - name: ADOMI_OIDC_AUTH_HOST
            value: auth.{{ .Values.domain }}
          - name: ADOMI_OIDC_APP_SLUG
            value: adomi-platform-management
          - name: ADOMI_PORTAL_BASE_URL
            value: https://platform.{{ .Values.domain }}
          # Public web base of the org holding customer infrastructure repos —
          # the portal deep-links each customer's repo from here.
          - name: ADOMI_GIT_PUBLIC_BASE
            value: https://git.{{ .Values.domain }}/{{ .Values.clients.forgejoOrg }}
{{- if .Values.clients.enabled }}
          # Git is the source of truth: the portal is a thin client of the platform
          # API, which commits client CRs to Forgejo. The API bearer token comes from
          # the adomi-platform-api Secret (cluster-secrets ExternalSecret, OpenBao).
          - name: ADOMI_WRITE_BACKEND
            value: api
          - name: ADOMI_PLATFORM_API_URL
            value: http://adomi-platform-api.adomi-system.svc.cluster.local:8080
          - name: ADOMI_PLATFORM_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: adomi-platform-api
                key: api-token
{{- end }}
        ingress:
          enabled: true
          className: {{ .Values.ingressClass | quote }}
          hosts:
            - host: platform.{{ .Values.domain }}
              paths:
                - path: /
                  pathType: Prefix
          # Routes /websocket + /longpolling to the gevent port (8072). TLS is not
          # declared per-ingress: Traefik terminates centrally with the wildcard.
          longpolling:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: adomi-platform-management
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
