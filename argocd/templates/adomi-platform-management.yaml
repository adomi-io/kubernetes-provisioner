# The Adomi platform management portal: an Odoo instance (image
# adomi-platform-management-odoo) deployed via the adomi-helm odoo chart, with the
# adomi_platform module installed on boot. Its ServiceAccount is granted the
# platform.adomi.io RBAC by platform-resources (wave 6). Auth is Odoo's own login
# (not the platform forward-auth). Lives at platform.<domain>.
#
# Wave 7 - after the controller + CRDs (wave 5), the catalog (wave 6) and its DB +
# admin secret (app-databases, wave 5).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adomi-platform-management
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.odoo.repoURL | quote }}
    targetRevision: {{ .Values.charts.odoo.targetRevision | quote }}
    path: {{ .Values.charts.odoo.path | quote }}
    helm:
      valuesObject:
        image:
          repository: {{ .Values.platformManagement.image.repository | quote }}
          tag: {{ .Values.platformManagement.image.tag | quote }}
          # With a mutable tag (latest), always re-pull so a rollout picks up the
          # newest image. Pin tag to a commit SHA for true GitOps rollouts.
          pullPolicy: Always
        serviceAccount:
          create: true
          name: adomi-platform-management
        postgresql:
          enabled: false
        database:
          host: management-db-rw
          port: 5432
          name: odoo
          user: odoo
          existingSecret: management-db-app
          existingSecretKey: password
          sslmode: require
        adminPassword:
          existingSecret: management-admin
          existingSecretKey: admin-password
        odoo:
          proxyMode: true
          withoutDemo: true
          # Install the addon on first boot, and upgrade it every boot so a new
          # image actually applies model/view/security changes to the database.
          initModules: adomi_platform
          updateModules: adomi_platform
        # Shared bearer token the platform controller authenticates its status
        # pushes with (must match the controller's ODOO_NOTIFY token). Delivered by
        # the adomi-ingest ExternalSecret (app-databases) from OpenBao.
        extraEnv:
          - name: ADOMI_INGEST_TOKEN
            valueFrom:
              secretKeyRef:
                name: adomi-ingest
                key: token
        ingress:
          enabled: true
          className: {{ .Values.ingressClass | quote }}
          hosts:
            - host: platform.{{ .Values.domain }}
              paths:
                - path: /
                  pathType: Prefix
          longpolling:
            enabled: true
          annotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer | quote }}
          tls:
            - hosts:
                - platform.{{ .Values.domain }}
              secretName: platform-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: adomi-platform-management
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
