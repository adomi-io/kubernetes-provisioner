# The platform control plane. Reconciles SSOApplication resources into Authentik
# (OAuth2 providers + applications) and OpenBao (client credentials, generated
# once), then publishes the credentials into app namespaces via External Secrets.
#
# Comes up in wave 5, after Authentik (wave 4) is serving and OpenBao is
# configured (openbao-bootstrap, wave 3, also creates this controller's OpenBao
# role + write policy). The SSO apps themselves are declared by the
# platform-resources app (wave 6).
#
# Runs in the adomi-system namespace with the ServiceAccount the OpenBao role is
# bound to (adomi-platform-controller). The image must be published to
# {{ .Values.platformController.image.repository }} first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adomi-platform-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.platformController.repoURL | quote }}
    targetRevision: {{ .Values.platformController.targetRevision | quote }}
    path: charts/adomi-platform-controller
    helm:
      valuesObject:
        image:
          repository: {{ .Values.platformController.image.repository | quote }}
          tag: {{ .Values.platformController.image.tag | quote }}
        backend:
          openbao:
            address: {{ .Values.openbao.address | quote }}
            kvMount: {{ .Values.openbao.kvMount | quote }}
            authMode: kubernetes
            kubernetes:
              authMount: {{ .Values.openbao.kubernetesAuthMountPath | quote }}
              authRole: adomi-platform-controller
          authentik:
            address: {{ .Values.authentik.address | quote }}
            secretPath: {{ .Values.openbao.authentikSecretPath | quote }}
            authorizationFlowSlug: {{ .Values.authentik.authorizationFlowSlug | quote }}
            invalidationFlowSlug: {{ .Values.authentik.invalidationFlowSlug | quote }}
            signingKeyName: {{ .Values.authentik.signingKeyName | quote }}
          externalSecrets:
            clusterSecretStore: openbao
        # Application platform wiring. The base domain drives generated hostnames
        # (<app>-<workspace>-<client>.<domain>, one label so the *.<domain> wildcard
        # cert/record covers it) and the Harbor / webhook host fallbacks
        # (harbor.<domain>, hooks.<domain>); the build/preview/snapshot features keep
        # their chart defaults. odooNotify points at the in-cluster management portal
        # so the controller pushes status changes to it live (token from OpenBao).
        platform:
          baseDomain: {{ .Values.domain | quote }}
          odooNotify:
            url: http://adomi-platform-management-odoo.adomi-platform-management.svc.cluster.local:8069
  destination:
    server: https://kubernetes.default.svc
    namespace: adomi-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRDs in this chart can be large; apply them server-side.
      - ServerSideApply=true