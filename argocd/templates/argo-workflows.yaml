# Argo Workflows runs jobs and pipelines, at argo.<domain>. Comes up near the end
# (wave 2), once ingress and the certificate issuer it needs are ready.
#
# The UI is gated by Authentik single sign-on: you log in through Authentik, and
# your Authentik group decides whether you're an admin or read-only. The client
# secret comes from OpenBao via the argo-workflows-sso Secret. The one-time Authentik
# setup is in the README's Secrets section.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.argoWorkflows.repoURL | quote }}
    chart: {{ .Values.charts.argoWorkflows.chart | quote }}
    targetRevision: {{ .Values.charts.argoWorkflows.version | quote }}
    helm:
      valuesObject:
        server:
          # Log in through Authentik (OIDC) instead of running open.
          authModes:
            - sso
          sso:
            # Authentik's OIDC endpoint for this app. The trailing "argo-workflows"
            # is the application slug you create in Authentik.
            issuer: https://auth.{{ .Values.domain }}/application/o/argo-workflows/
            clientId:
              name: argo-workflows-sso
              key: client-id
            clientSecret:
              name: argo-workflows-sso
              key: client-secret
            redirectUrl: https://argo.{{ .Values.domain }}/oauth2/callback
            # "groups" lets Authentik tell Argo which group you're in, for roles below.
            scopes:
              - openid
              - profile
              - email
              - groups
            rbac:
              enabled: true
            sessionExpiry: 10h
          ingress:
            enabled: true
            ingressClassName: {{ .Values.ingressClass }}
            annotations:
              cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            hosts:
              - argo.{{ .Values.domain }}
            tls:
              - hosts:
                  - argo.{{ .Values.domain }}
                secretName: argo-workflows-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
