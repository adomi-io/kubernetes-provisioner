# Argo Workflows runs jobs and pipelines, at argo.<domain>. Comes up near the end,
# once ingress and the certificate issuer it needs are ready.
#
# Runs in "server" auth mode by default. Set argoWorkflowsSso=true to log in
# through Authentik instead - that needs a one-time Authentik OAuth app and the
# argo-workflows-sso secret in OpenBao (see the README's Secrets section).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.argoWorkflows.repoURL | quote }}
    chart: {{ .Values.charts.argoWorkflows.chart | quote }}
    targetRevision: {{ .Values.charts.argoWorkflows.version | quote }}
    helm:
      valuesObject:
        server:
{{- if .Values.argoWorkflowsSso }}
          # Log in through Authentik (OIDC). Roles come from Authentik groups.
          authModes:
            - sso
          sso:
            enabled: true
            issuer: https://auth.{{ .Values.domain }}/application/o/argo-workflows/
            clientId:
              name: argo-workflows-sso
              key: client-id
            clientSecret:
              name: argo-workflows-sso
              key: client-secret
            redirectUrl: https://argo.{{ .Values.domain }}/oauth2/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            rbac:
              enabled: true
            sessionExpiry: 10h
          # The argo-workflows-sso secret is published by the platform controller
          # (wave 5) once it reconciles the SSOApplication (wave 6) - later than
          # this app (wave 4). Without this, the server boots first and
          # CrashLoopBackOffs on "secret not found". Wait for the secret so the
          # pod sits quietly in Init until SSO is actually ready.
          extraInitContainers:
            - name: wait-for-sso-secret
              image: registry.k8s.io/kubectl:v1.33.0
              command:
                - sh
                - -c
                - |
                  until kubectl get secret argo-workflows-sso >/dev/null 2>&1; do
                    echo "waiting for secret/argo-workflows-sso (published by the platform controller)..."
                    sleep 5
                  done
                  echo "argo-workflows-sso present; starting server."
{{- else }}
          authModes:
            - server
{{- end }}
          ingress:
            enabled: true
            ingressClassName: {{ .Values.ingressClass }}
            annotations:
              cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            hosts:
              - argo.{{ .Values.domain }}
            tls:
              - hosts:
                  - argo.{{ .Values.domain }}
                secretName: argo-workflows-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
