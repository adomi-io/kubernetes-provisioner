# Argo Workflows runs jobs and pipelines, at argo.<domain>. Comes up near the end,
# once ingress and the certificate issuer it needs are ready.
#
# Runs in "server" auth mode by default. Set argoWorkflowsSso=true to log in
# through Authentik instead - that needs a one-time Authentik OAuth app and the
# argo-workflows-sso secret in OpenBao (see the README's Secrets section).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.argoWorkflows.repoURL | quote }}
    chart: {{ .Values.charts.argoWorkflows.chart | quote }}
    targetRevision: {{ .Values.charts.argoWorkflows.version | quote }}
    helm:
      valuesObject:
        server:
{{- if .Values.argoWorkflowsSso }}
          # Log in through Authentik (OIDC). Roles come from Authentik groups.
          authModes:
            - sso
          sso:
            enabled: true
            issuer: https://auth.{{ .Values.domain }}/application/o/argo-workflows/
            clientId:
              name: argo-workflows-sso
              key: client-id
            clientSecret:
              name: argo-workflows-sso
              key: client-secret
            redirectUrl: https://argo.{{ .Values.domain }}/oauth2/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            rbac:
              enabled: true
            sessionExpiry: 10h
{{- else }}
          authModes:
            - server
{{- end }}
          ingress:
            enabled: true
            ingressClassName: {{ .Values.ingressClass }}
            annotations:
              cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            hosts:
              - argo.{{ .Values.domain }}
            tls:
              - hosts:
                  - argo.{{ .Values.domain }}
                secretName: argo-workflows-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
