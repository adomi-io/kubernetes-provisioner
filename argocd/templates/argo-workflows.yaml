# Argo Workflows runs jobs and pipelines, at argo.<domain>. Comes up near the end,
# once ingress and the certificate issuer it needs are ready.
#
# Always logs in through Authentik (OIDC). The platform controller reconciles the
# SSOApplication and publishes the argo-workflows-sso secret the server reads (see
# the README's Secrets section).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.argoWorkflows.repoURL | quote }}
    chart: {{ .Values.charts.argoWorkflows.chart | quote }}
    targetRevision: {{ .Values.charts.argoWorkflows.version | quote }}
    helm:
      valuesObject:
        server:
          # Log in through Authentik (OIDC). Roles come from Authentik groups.
          authModes:
            - sso
          sso:
            enabled: true
            issuer: https://auth.{{ .Values.domain }}/application/o/argo-workflows/
            clientId:
              name: argo-workflows-sso
              key: client-id
            clientSecret:
              name: argo-workflows-sso
              key: client-secret
            redirectUrl: https://argo.{{ .Values.domain }}/oauth2/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            rbac:
              enabled: true
            sessionExpiry: 10h
          # The argo-workflows-sso secret is published by the platform controller
          # (wave 5) once it reconciles the SSOApplication (wave 6) - later than
          # this app (wave 4). Without this, the server boots first and
          # CrashLoopBackOffs on "secret not found". Wait for the secret so the
          # pod sits quietly in Init until SSO is actually ready.
          extraInitContainers:
            - name: wait-for-sso-secret
              image: alpine/k8s:1.33.12
              command:
                - sh
                - -c
                - |
                  until kubectl get secret argo-workflows-sso >/dev/null 2>&1; do
                    echo "waiting for secret/argo-workflows-sso (published by the platform controller)..."
                    sleep 5
                  done
                  echo "argo-workflows-sso present; starting server."
          ingress:
            enabled: true
            ingressClassName: {{ .Values.ingressClass }}
            annotations:
              cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            hosts:
              - argo.{{ .Values.domain }}
            tls:
              - hosts:
                  - argo.{{ .Values.domain }}
                secretName: argo-workflows-tls
        # SSO RBAC: Argo maps each logged-in user to a ServiceAccount via the
        # workflows.argoproj.io/rbac-rule annotation (a CEL expr over the OIDC
        # claims) and acts with that SA's Kubernetes RBAC. Each SA needs a token
        # Secret (k8s 1.24+ does not auto-create them) and a RoleBinding to one of
        # the chart's argo-workflows-{view,edit,admin} ClusterRoles.
        extraObjects:
          # Admins: members of the "Argo Workflows Admins" Authentik group (the
          # platform controller ensures it exists - add members in Authentik).
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: argo-admin
              namespace: argo
              annotations:
                workflows.argoproj.io/rbac-rule: "'Argo Workflows Admins' in groups"
                workflows.argoproj.io/rbac-rule-precedence: "100"
          - apiVersion: v1
            kind: Secret
            metadata:
              name: argo-admin.service-account-token
              namespace: argo
              annotations:
                kubernetes.io/service-account.name: argo-admin
            type: kubernetes.io/service-account-token
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: argo-admin-sso
              namespace: argo
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: argo-workflows-admin
            subjects:
              - kind: ServiceAccount
                name: argo-admin
                namespace: argo
          # Default: everyone else who can log in gets read-only (view).
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: argo-default
              namespace: argo
              annotations:
                workflows.argoproj.io/rbac-rule: "true"
                workflows.argoproj.io/rbac-rule-precedence: "0"
          - apiVersion: v1
            kind: Secret
            metadata:
              name: argo-default.service-account-token
              namespace: argo
              annotations:
                kubernetes.io/service-account.name: argo-default
            type: kubernetes.io/service-account-token
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: argo-default-sso
              namespace: argo
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: argo-workflows-view
            subjects:
              - kind: ServiceAccount
                name: argo-default
                namespace: argo
          # Cluster-scoped reads for the SSO SAs. clusterworkflowtemplates is a
          # CLUSTER-scoped resource, so the namespaced RoleBindings above can't
          # authorize it - the server lists them at the cluster scope on behalf
          # of the logged-in SA and 403s. A ClusterRoleBinding is the only way
          # to grant a cluster-scoped resource. eventsources/sensors (argo-events)
          # are probed by the UI's event-flow page even though argo-events isn't
          # installed here; granting read turns those 403s into harmless
          # empty/NotFound responses.
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRole
            metadata:
              name: argo-workflows-sso-cluster-view
            rules:
              - apiGroups: ["argoproj.io"]
                resources:
                  - clusterworkflowtemplates
                  - clusterworkflowtemplates/finalizers
                  - eventsources
                  - sensors
                verbs: ["get", "list", "watch"]
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: argo-sso-cluster-view
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: argo-workflows-sso-cluster-view
            subjects:
              - kind: ServiceAccount
                name: argo-default
                namespace: argo
              - kind: ServiceAccount
                name: argo-admin
                namespace: argo
          # Admins can also create/edit cluster workflow templates from the UI.
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRole
            metadata:
              name: argo-workflows-sso-cluster-admin
            rules:
              - apiGroups: ["argoproj.io"]
                resources:
                  - clusterworkflowtemplates
                  - clusterworkflowtemplates/finalizers
                verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: argo-admin-sso-cluster
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: argo-workflows-sso-cluster-admin
            subjects:
              - kind: ServiceAccount
                name: argo-admin
                namespace: argo
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
