# Windmill (workflow / script automation) at windmill.<domain>. Uses the
# CloudNativePG windmill-db cluster - Windmill wants a single DATABASE_URL, which is
# exactly the uri key CNPG writes into windmill-db-app, so it reads that directly.
#
# SSO: OSS Windmill configures OAuth at runtime in the superadmin UI, not via Helm.
# The platform controller has created the Authentik app + windmill-sso Secret;
# add the provider under Instance Settings -> SSO/OAuth.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: windmill
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.windmill.repoURL | quote }}
    chart: {{ .Values.charts.windmill.chart | quote }}
    targetRevision: {{ .Values.charts.windmill.version | quote }}
    helm:
      valuesObject:
        postgresql:
          enabled: false
        windmill:
          databaseUrlSecretName: windmill-db-app
          databaseUrlSecretKey: uri
          baseDomain: windmill.{{ .Values.domain }}
          baseProtocol: https
        ingress:
          enabled: true
          className: {{ .Values.ingressClass }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            # Require an Authentik sign-in (forward-auth) before reaching Windmill.
            traefik.ingress.kubernetes.io/router.middlewares: "windmill-ak-forward-auth@kubernetescrd"
          tls:
            - secretName: windmill-tls
              hosts:
                - windmill.{{ .Values.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: windmill
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
