{{- if .Values.clients.enabled }}
# The producer API (adomi-platform-api): turns resource intent from Odoo / the CLI /
# partner UIs into commits in each customer's client repo (Forgejo). Lives in
# adomi-system beside the controller. Wave 7 — after the controller (5), the catalog
# (6), and its Secret (adomi-platform-api, from cluster-secrets, wave 3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adomi-platform-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.platformApi.repoURL | quote }}
    targetRevision: {{ .Values.platformApi.targetRevision | quote }}
    path: {{ .Values.platformApi.path | quote }}
    helm:
      valuesObject:
        image:
          repository: {{ .Values.platformApi.image.repository | quote }}
          tag: {{ .Values.platformApi.image.tag | quote }}
          pullPolicy: Always
        forgejo:
          url: {{ .Values.clients.forgejoApi | quote }}
          org: {{ .Values.clients.forgejoOrg | quote }}
        clientNamespacePrefix: {{ .Values.clients.clientNamespacePrefix | quote }}
        # api-token + forgejo-token, delivered by cluster-secrets from OpenBao.
        auth:
          existingSecret: adomi-platform-api
          apiTokenKey: api-token
          forgejoTokenKey: forgejo-token
  destination:
    server: https://kubernetes.default.svc
    namespace: adomi-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
