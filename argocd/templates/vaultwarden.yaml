# Vaultwarden (Bitwarden-compatible password manager) at vault.<domain>. Uses the
# CloudNativePG vaultwarden-db cluster. Access is gated by Authentik forward-auth at
# the ingress; inside Vaultwarden you unlock with your email + master password (its
# own auth, required for vault encryption). No self-service registration.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.vaultwarden.repoURL | quote }}
    chart: {{ .Values.charts.vaultwarden.chart | quote }}
    targetRevision: {{ .Values.charts.vaultwarden.version | quote }}
    helm:
      valuesObject:
        domain: https://vault.{{ .Values.domain }}
        # Self-registration and org invitations off; new users are added via the
        # Vaultwarden admin page (/admin, ADMIN_TOKEN).
        signupsAllowed: false
        invitationsAllowed: false
        database:
          type: postgresql
          host: vaultwarden-db-rw
          port: "5432"
          dbName: vaultwarden
          existingSecret: vaultwarden-db-app
          existingSecretUserKey: username
          existingSecretPasswordKey: password
        ingress:
          enabled: true
          class: {{ .Values.ingressClass }}
          nginxIngressAnnotations: false
          additionalAnnotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            # Require an Authentik sign-in (forward-auth) before reaching Vaultwarden.
            traefik.ingress.kubernetes.io/router.middlewares: "vaultwarden-ak-forward-auth@kubernetescrd"
          tls: true
          hostname: vault.{{ .Values.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
