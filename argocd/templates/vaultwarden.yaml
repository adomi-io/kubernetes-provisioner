# Vaultwarden (Bitwarden-compatible password manager) at vault.<domain>. Uses the
# CloudNativePG vaultwarden-db cluster, and logs in through Authentik via its SSO
# support (credentials from vaultwarden-sso, published by the platform controller).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.vaultwarden.repoURL | quote }}
    chart: {{ .Values.charts.vaultwarden.chart | quote }}
    targetRevision: {{ .Values.charts.vaultwarden.version | quote }}
    helm:
      valuesObject:
        domain: https://vault.{{ .Values.domain }}
        database:
          type: postgresql
          host: vaultwarden-db-rw
          port: "5432"
          dbName: vaultwarden
          existingSecret: vaultwarden-db-app
          existingSecretUserKey: username
          existingSecretPasswordKey: password
        sso:
          enabled: true
          authority: https://auth.{{ .Values.domain }}/application/o/vaultwarden/
          existingSecret: vaultwarden-sso
          clientId:
            existingSecretKey: client-id
          clientSecret:
            existingSecretKey: client-secret
          scopes: "openid email profile"
        ingress:
          enabled: true
          class: {{ .Values.ingressClass }}
          nginxIngressAnnotations: false
          additionalAnnotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
          tls: true
          hostname: vault.{{ .Values.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
