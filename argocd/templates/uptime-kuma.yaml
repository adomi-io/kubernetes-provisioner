# Uptime Kuma (status / uptime monitoring) at status.<domain>. Stores its monitors
# on a PVC. It has no native SSO, so the whole host is fronted by Authentik
# forward-auth (the ak-forward-auth Middleware from platform-resources) - every
# request must sign in through Authentik. This also gates the public status pages;
# to expose those, exclude their paths from the Middleware on the ingress.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.uptimeKuma.repoURL | quote }}
    chart: {{ .Values.charts.uptimeKuma.chart | quote }}
    targetRevision: {{ .Values.charts.uptimeKuma.version | quote }}
    helm:
      valuesObject:
        volume:
          enabled: true
          accessMode: ReadWriteOnce
          size: 4Gi
        ingress:
          enabled: true
          className: {{ .Values.ingressClass }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            # Require Authentik sign-in (forwardAuth Middleware in this namespace).
            traefik.ingress.kubernetes.io/router.middlewares: uptime-kuma-ak-forward-auth@kubernetescrd
          hosts:
            - host: status.{{ .Values.domain }}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: uptime-kuma-tls
              hosts:
                - status.{{ .Values.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: uptime-kuma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
