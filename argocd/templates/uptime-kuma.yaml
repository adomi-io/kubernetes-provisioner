# Uptime Kuma (status / uptime monitoring) at status.<domain>. Stores its monitors
# on a PVC. It has no native SSO - front it with forward-auth if you need to gate
# the admin UI; the status page itself is meant to be public.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.uptimeKuma.repoURL | quote }}
    chart: {{ .Values.charts.uptimeKuma.chart | quote }}
    targetRevision: {{ .Values.charts.uptimeKuma.version | quote }}
    helm:
      valuesObject:
        volume:
          enabled: true
          accessMode: ReadWriteOnce
          size: 4Gi
        ingress:
          enabled: true
          className: {{ .Values.ingressClass }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
          hosts:
            - host: status.{{ .Values.domain }}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: uptime-kuma-tls
              hosts:
                - status.{{ .Values.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: uptime-kuma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
