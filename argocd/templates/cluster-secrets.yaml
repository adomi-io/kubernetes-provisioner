# Tells the External Secrets Operator where your OpenBao is and which secrets to
# pull. Comes up after the operator (wave 1) and before authentik needs what it
# pulls. Lives in this repo under charts/cluster-secrets.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.gitRepoURL | quote }}
    targetRevision: {{ .Values.gitTargetRevision | quote }}
    path: charts/cluster-secrets
    helm:
      valuesObject:
        openbao:
          address: {{ .Values.openbao.address | quote }}
          kvMount: {{ .Values.openbao.kvMount | quote }}
          kubernetesAuthMountPath: {{ .Values.openbao.kubernetesAuthMountPath | quote }}
          kubernetesAuthRole: {{ .Values.openbao.kubernetesAuthRole | quote }}
          authentikSecretPath: {{ .Values.openbao.authentikSecretPath | quote }}
          argoWorkflowsSecretPath: {{ .Values.openbao.argoWorkflowsSecretPath | quote }}
          forgejoSecretPath: {{ .Values.openbao.forgejoSecretPath | quote }}
        s3SecretPath: {{ .Values.s3.secretPath | quote }}
        clients:
          enabled: {{ .Values.clients.enabled }}
          forgejoCloneBase: {{ .Values.clients.forgejoCloneBase | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true