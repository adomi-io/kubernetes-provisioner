# The External Secrets Operator - the bridge that copies secrets out of OpenBao and
# into the cluster as normal Kubernetes Secrets. It comes up first (wave 0) so the
# secrets are there before anything asks for them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.externalSecrets.repoURL | quote }}
    chart: {{ .Values.charts.externalSecrets.chart | quote }}
    targetRevision: {{ .Values.charts.externalSecrets.version | quote }}
    helm:
      parameters:
        - name: installCRDs
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Its definitions are big too, so apply them server-side (same as cert-manager).
      - ServerSideApply=true