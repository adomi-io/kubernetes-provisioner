# Grafana + Prometheus + Alertmanager (kube-prometheus-stack), in the monitoring
# namespace. Grafana is exposed at grafana.<domain> behind Authentik forward-auth and
# logs the user in from the X-authentik-* headers (auth.proxy). Prometheus and
# Alertmanager are deliberately left cluster-internal (no ingress) since they have no
# auth of their own - reach them with a port-forward.
#
# Grafana's local admin password comes from grafana-admin (seeded by openbao-bootstrap)
# and is the break-glass login (basic-auth via the API). Loki and Tempo are datasources.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.kubePrometheusStack.repoURL | quote }}
    chart: {{ .Values.charts.kubePrometheusStack.chart | quote }}
    targetRevision: {{ .Values.charts.kubePrometheusStack.version | quote }}
    helm:
      valuesObject:
        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          # Persist Grafana's database (sessions, auto-created proxy users,
          # preferences). On emptyDir every pod restart wiped it, so browsers
          # holding a session cookie hit "user token not found" on the rotate
          # call and reload-looped until cookies were cleared.
          persistence:
            enabled: true
            size: 2Gi
          # A single replica on an RWO volume: replace the pod, don't roll it.
          deploymentStrategy:
            type: Recreate
          grafana.ini:
            server:
              root_url: https://grafana.{{ .Values.domain }}
            # Authentik forward-auth gates the ingress and passes the signed-in user
            # as X-authentik-* headers; Grafana trusts them (auth.proxy) and logs the
            # user in, auto-creating the account. Local login form stays off;
            # break-glass is basic-auth via the API with the grafana-admin credentials.
            auth:
              disable_login_form: true
            auth.proxy:
              enabled: true
              header_name: X-authentik-username
              header_property: username
              auto_sign_up: true
              headers: "Email:X-authentik-email Name:X-authentik-name"
              sync_ttl: 60
            users:
              # No self-service accounts; identities come from the forward-auth header.
              # New users land in the default org role (Viewer); promote admins manually.
              allow_sign_up: false
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
            - name: Tempo
              type: tempo
              access: proxy
              url: http://tempo.monitoring.svc.cluster.local:3100
          ingress:
            enabled: true
            ingressClassName: {{ .Values.ingressClass }}
            annotations:
              cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
              # Require an Authentik sign-in (forward-auth) before reaching Grafana.
              traefik.ingress.kubernetes.io/router.middlewares: "monitoring-ak-forward-auth@kubernetescrd"
            hosts:
              - grafana.{{ .Values.domain }}
            path: /
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.{{ .Values.domain }}
        # Prometheus + Alertmanager: deployed, no public ingress (no built-in auth).
        prometheus:
          ingress:
            enabled: false
        alertmanager:
          ingress:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # The kube-prometheus-stack CRDs are large; apply them server-side.
      - ServerSideApply=true
