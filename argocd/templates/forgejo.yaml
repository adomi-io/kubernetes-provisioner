# Forgejo (git forge) at git.<domain>, from the Forgejo OCI Helm chart. Uses the
# CloudNativePG forgejo-db cluster (password from forgejo-db-app via env). Logs in
# through Authentik (OpenID Connect): the controller writes the creds to OpenBao,
# app-databases turns them into the forgejo-oauth Secret with the key/secret keys
# Forgejo's oauth init job expects.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.forgejo.repoURL | quote }}
    chart: {{ .Values.charts.forgejo.chart | quote }}
    targetRevision: {{ .Values.charts.forgejo.version | quote }}
    helm:
      valuesObject:
        gitea:
          config:
            server:
              DOMAIN: git.{{ .Values.domain }}
              ROOT_URL: https://git.{{ .Values.domain }}/
            database:
              DB_TYPE: postgres
              HOST: forgejo-db-rw:5432
              NAME: forgejo
              USER: forgejo
              SSL_MODE: require
            # Self-registration off and sign-in required to view anything. Accounts
            # are created only by logging in through Authentik (auto-registration
            # below). Forgejo has no setting to hide the local login form, so it still
            # renders. git over HTTPS keeps working via tokens.
            service:
              DISABLE_REGISTRATION: true
              SHOW_REGISTRATION_BUTTON: false
              REQUIRE_SIGNIN_VIEW: true
            # OpenID 2.0 self-service login/signup off (distinct from the Authentik OIDC).
            openid:
              ENABLE_OPENID_SIGNIN: false
              ENABLE_OPENID_SIGNUP: false
            # Auto-create a Forgejo account on first Authentik (OIDC) login and link
            # by email; this is allowed even with DISABLE_REGISTRATION on.
            oauth2_client:
              ENABLE_AUTO_REGISTRATION: true
              ACCOUNT_LINKING: auto
              UPDATE_AVATAR: true
          # DB password injected from the CNPG-managed Secret (no value in git).
          additionalConfigFromEnvs:
            - name: FORGEJO__DATABASE__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-app
                  key: password
          # Authentik OIDC. The init job reads keys key/secret from forgejo-oauth.
          oauth:
            - name: authentik
              provider: openidConnect
              existingSecret: forgejo-oauth
              autoDiscoverUrl: https://auth.{{ .Values.domain }}/application/o/forgejo/.well-known/openid-configuration
        ingress:
          enabled: true
          className: {{ .Values.ingressClass }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
          hosts:
            - host: git.{{ .Values.domain }}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: forgejo-tls
              hosts:
                - git.{{ .Values.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
