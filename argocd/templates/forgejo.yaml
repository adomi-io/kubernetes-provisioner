# Forgejo (git forge) at git.<domain>, from the Forgejo OCI Helm chart. Uses the
# CloudNativePG forgejo-db cluster (password from forgejo-db-app via env). Auth is
# handled by Authentik forward-auth at the ingress; Forgejo trusts the X-authentik-*
# headers the outpost injects (reverse proxy auth) and auto-creates the account.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.forgejo.repoURL | quote }}
    chart: {{ .Values.charts.forgejo.chart | quote }}
    targetRevision: {{ .Values.charts.forgejo.version | quote }}
    helm:
      valuesObject:
        gitea:
          # Local admin account. End-user auth is Authentik forward-auth; this
          # account exists only so openbao-bootstrap can mint the per-customer GitOps
          # service token in-cluster. Username/password come from the forgejo-admin
          # Secret (delivered by cluster-secrets from OpenBao); keepUpdated re-applies
          # the password on each sync so Forgejo and OpenBao never drift.
          admin:
            existingSecret: forgejo-admin
            email: admin@{{ .Values.domain }}
            passwordMode: keepUpdated
          config:
            server:
              DOMAIN: git.{{ .Values.domain }}
              ROOT_URL: https://git.{{ .Values.domain }}/
            database:
              DB_TYPE: postgres
              HOST: forgejo-db-rw:5432
              NAME: forgejo
              USER: forgejo
              SSL_MODE: require
            # Trust the forward-auth headers from the Authentik outpost and log the
            # user in (auto-registering on first visit). Self-registration and sign-in
            # to view are off; the local login form is unused.
            service:
              DISABLE_REGISTRATION: true
              SHOW_REGISTRATION_BUTTON: false
              REQUIRE_SIGNIN_VIEW: true
              ENABLE_REVERSE_PROXY_AUTHENTICATION: true
              ENABLE_REVERSE_PROXY_AUTO_REGISTRATION: true
              ENABLE_REVERSE_PROXY_EMAIL: true
              ENABLE_REVERSE_PROXY_FULL_NAME: true
            security:
              REVERSE_PROXY_AUTHENTICATION_USER: X-authentik-username
              REVERSE_PROXY_AUTHENTICATION_EMAIL: X-authentik-email
              REVERSE_PROXY_AUTHENTICATION_FULL_NAME: X-authentik-name
              # Trust any source for the header - in-cluster only, fronted by Traefik.
              REVERSE_PROXY_TRUSTED_PROXIES: "*"
              # The local admin password is a random hex string seeded in OpenBao,
              # which has no upper/special chars - turn off complexity so the chart's
              # admin-init accepts it. The account is in-cluster only (forward-auth).
              PASSWORD_COMPLEXITY: "off"
            # Forgejo refuses webhook deliveries to non-public addresses by
            # default. Allow EXACTLY the two in-cluster receivers of the org
            # push hooks (Argo CD repo refresh + the portal re-sync) — not a
            # wildcard, so repo admins can't aim webhooks at other services.
            webhook:
              ALLOWED_HOST_LIST: "argo-cd-argocd-server.argocd.svc,adomi-platform-management.adomi-platform-management.svc"
          # DB password injected from the CNPG-managed Secret (no value in git).
          additionalConfigFromEnvs:
            - name: FORGEJO__DATABASE__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-app
                  key: password
        ingress:
          enabled: true
          className: {{ .Values.ingressClass }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            # Require an Authentik sign-in (forward-auth) before reaching Forgejo.
            traefik.ingress.kubernetes.io/router.middlewares: "forgejo-ak-forward-auth@kubernetescrd"
          hosts:
            - host: git.{{ .Values.domain }}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: forgejo-tls
              hosts:
                - git.{{ .Values.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
