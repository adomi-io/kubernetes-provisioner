# Open WebUI (chat UI for LLMs) at chat.<domain>. Uses the CloudNativePG
# openwebui-db cluster, sits behind Authentik forward-auth and logs the user in from
# the X-authentik-* headers (trusted-header auth), and talks to the in-cluster LiteLLM
# proxy as its OpenAI-compatible backend.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.openWebui.repoURL | quote }}
    chart: {{ .Values.charts.openWebui.chart | quote }}
    targetRevision: {{ .Values.charts.openWebui.version | quote }}
    helm:
      valuesObject:
        # Bundled inference engines off - LiteLLM is the backend.
        ollama:
          enabled: false
        pipelines:
          enabled: false
        extraEnvVars:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: openwebui-db-app
                key: uri
          # Point at the LiteLLM proxy (OpenAI-compatible).
          - name: OPENAI_API_BASE_URL
            value: http://litellm.litellm.svc.cluster.local:4000/v1
          # Auth is handled by Authentik forward-auth at the ingress; Open WebUI trusts
          # the X-authentik-* headers and logs the user in, creating the account on
          # first visit (first user is admin). Local login form and signup are off.
          - name: ENABLE_LOGIN_FORM
            value: "False"
          - name: ENABLE_SIGNUP
            value: "False"
          - name: WEBUI_AUTH_TRUSTED_EMAIL_HEADER
            value: X-authentik-email
          - name: WEBUI_AUTH_TRUSTED_NAME_HEADER
            value: X-authentik-name
        ingress:
          enabled: true
          class: {{ .Values.ingressClass }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            # Require an Authentik sign-in (forward-auth) before reaching Open WebUI.
            traefik.ingress.kubernetes.io/router.middlewares: "open-webui-ak-forward-auth@kubernetescrd"
          host: chat.{{ .Values.domain }}
          tls: true
          existingSecret: open-webui-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
