{{- if .Values.clients.enabled }}
# Per-customer GitOps (workstream 3.1). Comes up after Forgejo (wave 7) and the
# platform controller (wave 5). The `clients` ApplicationSet discovers every client
# repo in the Forgejo org and, for each, bootstraps (in the privileged client-admin
# project) an AppProject + root Application from charts/client — so a customer's
# whole estate is reconstructable from git.
#
# Argo CD and the SCM generator talk to Forgejo over the in-cluster Service, NOT
# git.<domain>: the public ingress is gated by Authentik forward-auth, which would
# reject Argo's headless clone. Clone URLs are built from the repo name accordingly.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: client-admin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Bootstraps per-client AppProjects + root Applications from charts/client.
  sourceRepos:
    - {{ .Values.gitRepoURL | quote }}
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
  # Namespace only: the bootstrap chart creates each client's intent namespace
  # (platform-side), so the per-client projects stay fully fenced.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: argoproj.io
      kind: AppProject
    - group: argoproj.io
      kind: Application
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clients
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - scmProvider:
        # Re-list the org's repos every 2 minutes (default is 30!) so a freshly
        # created customer onboards while they're still looking at the screen.
        # Forgejo is in-cluster; the listing is cheap.
        requeueAfterSeconds: 120
        gitea:
          owner: {{ .Values.clients.forgejoOrg | quote }}
          api: {{ .Values.clients.forgejoApi | quote }}
          allBranches: false
          insecure: {{ .Values.clients.forgejoInsecure }}
          tokenRef:
            secretName: forgejo-scm-token
            key: token
      # Only repos that carry client intent (a clients/ directory) are bootstrapped.
        filters:
          - pathsExist: [clients]
  template:
    metadata:
      name: 'client-{{ `{{ .repository }}` }}-bootstrap'
    spec:
      project: client-admin
      source:
        repoURL: {{ .Values.gitRepoURL | quote }}
        targetRevision: {{ .Values.gitTargetRevision | quote }}
        path: charts/client
        helm:
          valuesObject:
            client: '{{ `{{ .repository }}` }}'
            repoURL: '{{ .Values.clients.forgejoCloneBase }}/{{ `{{ .repository }}` }}.git'
            targetRevision: {{ .Values.clients.targetRevision | quote }}
            clientNamespacePrefix: {{ .Values.clients.clientNamespacePrefix | quote }}
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
{{- end }}
