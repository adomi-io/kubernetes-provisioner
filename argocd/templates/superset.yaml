# Apache Superset (BI / dashboards) at superset.<domain>. Uses the CloudNativePG
# superset-db cluster and the chart's bundled Redis. SUPERSET_SECRET_KEY and the DB
# password are injected from Secrets; OIDC login through Authentik is wired via a
# Flask-AppBuilder config override that reads the credentials from superset-sso.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: superset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.superset.repoURL | quote }}
    chart: {{ .Values.charts.superset.chart | quote }}
    targetRevision: {{ .Values.charts.superset.version | quote }}
    helm:
      valuesObject:
        # The apache/superset image ships without a Postgres driver or authlib (the
        # OAuth login pulls authlib in via Flask-AppBuilder). Superset runs from the
        # /app/.venv uv venv (which has no pip), so a bare `pip install` lands in the
        # system env the venv can't import from - install into the venv with uv.
        bootstrapScript: |
          #!/bin/bash
          export UV_CACHE_DIR=/tmp/uv-cache
          uv pip install --python /app/.venv/bin/python psycopg2-binary authlib
          if [ ! -f ~/bootstrap ]; then echo "Running Superset" > ~/bootstrap; fi
        postgresql:
          enabled: false
        redis:
          enabled: true
        supersetNode:
          connections:
            db_host: superset-db-rw
            db_port: "5432"
            db_user: superset
            db_name: superset
        # Secrets as env (override the chart's inline/default values).
        extraEnvRaw:
          - name: SUPERSET_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: superset-secret
                key: secret-key
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: superset-db-app
                key: password
          - name: AUTHENTIK_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: superset-sso
                key: client-id
          - name: AUTHENTIK_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: superset-sso
                key: client-secret
        configOverrides:
          enable_oauth: |
            import os
            from flask_appbuilder.security.manager import AUTH_OAUTH
            AUTH_TYPE = AUTH_OAUTH
            AUTH_USER_REGISTRATION = True
            AUTH_USER_REGISTRATION_ROLE = "Gamma"
            OAUTH_PROVIDERS = [
                {
                    "name": "authentik",
                    "icon": "fa-key",
                    "token_key": "access_token",
                    "remote_app": {
                        "client_id": os.environ["AUTHENTIK_CLIENT_ID"],
                        "client_secret": os.environ["AUTHENTIK_CLIENT_SECRET"],
                        "server_metadata_url": "https://auth.{{ .Values.domain }}/application/o/superset/.well-known/openid-configuration",
                        "client_kwargs": {"scope": "openid email profile"},
                    },
                }
            ]
        ingress:
          enabled: true
          ingressClassName: {{ .Values.ingressClass }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            # Require an Authentik sign-in (forward-auth) before reaching Superset.
            traefik.ingress.kubernetes.io/router.middlewares: "superset-ak-forward-auth@kubernetescrd"
          path: /
          pathType: Prefix
          hosts:
            - superset.{{ .Values.domain }}
          tls:
            - secretName: superset-tls
              hosts:
                - superset.{{ .Values.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: superset
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
