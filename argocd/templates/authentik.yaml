# Authentik is single sign-on - one login across your apps - at auth.<domain>. It
# comes up in wave 4, once ingress, the certificate issuer, its secrets, and its
# database are ready. It brings its own Redis; Postgres is the CloudNativePG
# cluster from the authentik-db app (backed up to object storage).
#
# Nothing secret lives here. secret_key + bootstrap-token come from the
# authentik-secrets Secret (External Secrets pulls them from OpenBao); the database
# password comes from authentik-db-app, generated and managed by CloudNativePG.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.charts.authentik.repoURL | quote }}
    chart: {{ .Values.charts.authentik.chart | quote }}
    targetRevision: {{ .Values.charts.authentik.version | quote }}
    helm:
      valuesObject:
        # secret_key and the Postgres password come from authentik-secrets.
        # Setting them here as env vars wins over the chart's own generated config.
        global:
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret_key
            # Postgres is the CloudNativePG cluster (authentik-db), not a bundled
            # one. Connect to its read-write service; the password is generated by
            # CloudNativePG into the authentik-db-app Secret (operator-managed).
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-db-rw
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-db-app
                  key: password
            # Read on first boot only: creates an API token for akadmin that the
            # adomi-platform-controller uses to reconcile SSO apps. See the README's SSO section.
            - name: AUTHENTIK_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: bootstrap-token
            # Optional one-time admin: the installer drops an admin password + email
            # into the authentik-bootstrap Secret, which Authentik reads on first boot
            # only to set up akadmin (so you can log in without the web setup step).
            # The installer writes a hashed password (password-hash) when it can hash
            # locally, otherwise the plaintext (password); Authentik accepts either.
            # optional:true means a normal install (no Secret) is unaffected.
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: authentik-bootstrap
                  key: password-hash
                  optional: true
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-bootstrap
                  key: password
                  optional: true
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: authentik-bootstrap
                  key: email
                  optional: true
        # The chart's bundled Bitnami Postgres is off - CloudNativePG runs the DB
        # instead (see the authentik-db app), which gives us backups and HA.
        postgresql:
          enabled: false
        redis:
          enabled: true
        server:
          ingress:
            enabled: true
            ingressClassName: {{ .Values.ingressClass }}
            annotations:
              cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer }}
            hosts:
              - auth.{{ .Values.domain }}
            tls:
              - hosts:
                  - auth.{{ .Values.domain }}
                secretName: authentik-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
