# Open WebUI SSO. The controller publishes openwebui-sso (client-id /
# client-secret) into the open-webui namespace; Open WebUI reads it via its
# sso.oidc block for OIDC login.
apiVersion: identity.adomi.io/v1alpha1
kind: SSOApplication
metadata:
  name: openwebui
  namespace: open-webui
spec:
  displayName: Open WebUI
  protocol: oauth2
  redirectUris:
    - https://chat.{{ .Values.domain }}/oauth/oidc/callback
  scopes:
    - openid
    - profile
    - email
  credentials:
    openbaoPath: openwebui
    targetSecret:
      name: openwebui-sso
