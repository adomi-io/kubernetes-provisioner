# Harbor SSO. Harbor's Helm chart can't pre-seed OIDC, so this pre-provisions the
# Authentik provider/application and publishes harbor-sso (client-id /
# client-secret) into the harbor namespace. The harbor-oidc app then applies the
# config to Harbor via its API (issuer https://auth.<domain>/application/o/harbor/).
apiVersion: identity.adomi.io/v1alpha1
kind: SSOApplication
metadata:
  name: harbor
  namespace: harbor
spec:
  displayName: Harbor
  protocol: oauth2
  group: Developer Tools
  icon: fa://fa-docker
  publisher: CNCF
  description: Container and artifact registry
  launchUrl: https://harbor.{{ .Values.domain }}
  redirectUris:
    - https://harbor.{{ .Values.domain }}/c/oidc/callback
  scopes:
    - openid
    - profile
    - email
    - groups
  credentials:
    openbaoPath: harbor
    targetSecret:
      name: harbor-sso
