# Registry API bypass for the forward-auth gate. Harbor's Docker registry
# endpoints (/v2 and the /service token issuer) enforce their own bearer-token
# auth and speak the registry protocol — an auth-redirecting proxy in front of
# them breaks every client at the 401 + WWW-Authenticate handshake (buildkit
# pushes died with a mangled Docker-Content-Digest, crane with a redirected
# manifest GET). This higher-priority route sends them straight to harbor-core
# without the ak-forward-auth middleware; the UI (/) keeps the Authentik gate
# from Harbor's own ingress.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: harbor-registry-api
  namespace: harbor
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`harbor.{{ .Values.domain }}`) && (PathPrefix(`/v2`) || PathPrefix(`/service/`))
      # Above the Ingress-derived routers (whose priority is the rule length).
      priority: 100
      services:
        - name: harbor-core
          port: 80
  tls:
    # The cert the Harbor ingress already maintains via cert-manager.
    secretName: harbor-tls
