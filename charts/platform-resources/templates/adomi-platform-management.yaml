# RBAC for the Odoo management portal. Its pod (ServiceAccount
# adomi-platform-management, created by the odoo chart) reads and writes the
# platform.adomi.io custom resources via the Kubernetes API, so it gets a
# ClusterRole spanning those resources. SSO is handled by the shared forward-auth
# Middleware (the namespace is in forwardAuthNamespaces).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: adomi-platform-management
rules:
  - apiGroups: [platform.adomi.io]
    resources:
      - organizations
      - clients
      - workspaces
      - applications
      - applicationtypes
      - gitrepositories
      - snapshots
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: adomi-platform-management
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: adomi-platform-management
subjects:
  - kind: ServiceAccount
    name: adomi-platform-management
    namespace: adomi-platform-management
