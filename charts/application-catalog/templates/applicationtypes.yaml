---
apiVersion: platform.adomi.io/v1alpha1
kind: ApplicationType
metadata:
  name: odoo
spec:
  displayName: Odoo
  adapter: odoo
  chart:
    repoURL: {{ .Values.charts.odoo.repoURL | quote }}
    path: {{ .Values.charts.odoo.path | quote }}
    targetRevision: {{ .Values.charts.odoo.targetRevision | quote }}
  database:
    required: true
  sso:
    enabled: true
    protocol: proxy
  ingress:
    longpolling: true
  provides:
    - url
    - db
---
apiVersion: platform.adomi.io/v1alpha1
kind: ApplicationType
metadata:
  name: mailpit
spec:
  displayName: Mailpit (mail trap)
  adapter: mailpit
  chart:
    repoURL: {{ .Values.charts.mailpit.repoURL | quote }}
    path: {{ .Values.charts.mailpit.path | quote }}
    targetRevision: {{ .Values.charts.mailpit.targetRevision | quote }}
  database:
    required: false
  sso:
    enabled: true
    protocol: proxy
  provides:
    - url
    - smtp
---
apiVersion: platform.adomi.io/v1alpha1
kind: ApplicationType
metadata:
  name: superset
spec:
  displayName: Apache Superset
  adapter: superset
  chart:
    repoURL: {{ .Values.charts.superset.repoURL | quote }}
    path: {{ .Values.charts.superset.path | quote }}
    targetRevision: {{ .Values.charts.superset.targetRevision | quote }}
  database:
    required: true
  sso:
    enabled: true
    protocol: oauth2
    redirectPaths:
      - /oauth-authorized/authentik
  provides:
    - url
  consumes:
    - odoo-superset-datasource
---
apiVersion: platform.adomi.io/v1alpha1
kind: ApplicationType
metadata:
  name: vaultwarden
spec:
  displayName: Vaultwarden
  adapter: generic
  chart:
    repoURL: {{ .Values.charts.vaultwarden.repoURL | quote }}
    path: {{ .Values.charts.vaultwarden.path | quote }}
    targetRevision: {{ .Values.charts.vaultwarden.targetRevision | quote }}
  database:
    required: true
  provides:
    - url
---
apiVersion: platform.adomi.io/v1alpha1
kind: ApplicationType
metadata:
  name: open-webui
spec:
  displayName: Open WebUI
  adapter: generic
  chart:
    repoURL: {{ .Values.charts.openWebui.repoURL | quote }}
    path: {{ .Values.charts.openWebui.path | quote }}
    targetRevision: {{ .Values.charts.openWebui.targetRevision | quote }}
  database:
    required: true
  sso:
    enabled: true
    protocol: oauth2
    redirectPaths:
      - /oauth/oidc/callback
  provides:
    - url
---
apiVersion: platform.adomi.io/v1alpha1
kind: ApplicationType
metadata:
  name: uptime-kuma
spec:
  displayName: Uptime Kuma
  adapter: generic
  chart:
    repoURL: {{ .Values.charts.uptimeKuma.repoURL | quote }}
    path: {{ .Values.charts.uptimeKuma.path | quote }}
    targetRevision: {{ .Values.charts.uptimeKuma.targetRevision | quote }}
  # Embedded SQLite on a PVC — no platform Database. Native local login; platform
  # SSO is optional (a proxy SSOApplication fronting the host with forward-auth).
  database:
    required: false
  provides:
    - url
---
apiVersion: platform.adomi.io/v1alpha1
kind: ApplicationType
metadata:
  name: windmill
spec:
  displayName: Windmill
  adapter: generic
  chart:
    repoURL: {{ .Values.charts.windmill.repoURL | quote }}
    path: {{ .Values.charts.windmill.path | quote }}
    targetRevision: {{ .Values.charts.windmill.targetRevision | quote }}
  database:
    required: true
  # OSS Windmill wires OAuth at runtime in the superadmin UI; the platform just
  # pre-provisions the Authentik app + windmill-sso credentials.
  sso:
    enabled: true
    protocol: oauth2
    redirectPaths:
      - /user/login_callback/authentik
  provides:
    - url
