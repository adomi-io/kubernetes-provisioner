# The registrar runs in the openbao namespace and only needs to read the
# openbao-keys Secret (for the root token). Everything else is HTTP to OpenBao and
# Authentik. Nothing cluster-wide.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authentik-registrar
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authentik-registrar
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authentik-registrar
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: authentik-registrar
subjects:
  - kind: ServiceAccount
    name: authentik-registrar
