# Runs the registrar loop. One replica is enough - it just keeps each app's
# Authentik provider/application and OpenBao credentials in sync.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-registrar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-registrar
  template:
    metadata:
      labels:
        app: authentik-registrar
    spec:
      serviceAccountName: authentik-registrar
      containers:
        - name: registrar
          image: {{ .Values.image | quote }}
          command: ["/bin/sh", "/scripts/register.sh"]
          env:
            - name: BAO_ADDR
              value: {{ .Values.baoAddr | quote }}
            - name: KV_MOUNT
              value: {{ .Values.kvMount | quote }}
            - name: KEYS_SECRET
              value: {{ .Values.keysSecret | quote }}
            - name: AK_ADDR
              value: {{ .Values.authentikAddr | quote }}
            - name: AUTHENTIK_SECRET_PATH
              value: {{ .Values.authentikSecretPath | quote }}
            - name: AUTH_FLOW_SLUG
              value: {{ .Values.authorizationFlowSlug | quote }}
            - name: INVAL_FLOW_SLUG
              value: {{ .Values.invalidationFlowSlug | quote }}
            - name: SIGNING_KEY_NAME
              value: {{ .Values.signingKeyName | quote }}
            - name: INTERVAL
              value: {{ .Values.interval | quote }}
            - name: APPS_JSON
              value: {{ .Values.apps | toJson | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: authentik-registrar
