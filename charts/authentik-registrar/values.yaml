# Filled in by the authentik-registrar app (from argocd/values.yaml). Defaults are
# placeholders so the chart renders on its own.

# Image needs curl, jq, and kubectl - alpine/k8s ships all three (same as openbao-bootstrap).
image: alpine/k8s:1.31.4

# OpenBao: the registrar reads the root token from the openbao-keys Secret (it runs
# in the openbao namespace, same as openbao-bootstrap), then reads/writes KV over HTTP.
baoAddr: http://openbao.openbao.svc.cluster.local:8200
kvMount: secret
keysSecret: openbao-keys

# Authentik API. The registrar authenticates with the bootstrap-token stored at
# secret/<authentikSecretPath> in OpenBao (seeded by openbao-bootstrap, fed to
# Authentik at first boot as AUTHENTIK_BOOTSTRAP_TOKEN).
authentikAddr: http://authentik-server.authentik.svc.cluster.local
authentikSecretPath: authentik

# Shared Authentik references, resolved by slug/name at runtime. These are the
# objects Authentik ships out of the box.
authorizationFlowSlug: default-provider-authorization-implicit-consent
invalidationFlowSlug: default-provider-invalidation-flow
signingKeyName: authentik Self-signed Certificate

# How often the reconcile loop runs (seconds).
interval: 300

# The apps to register. Each becomes an OAuth2 provider + Application in Authentik,
# with client-id/client-secret generated once and stored at secret/<slug> in OpenBao.
# Empty by default - the argocd app fills this in (see argocd/templates/authentik-registrar.yaml).
#
#   apps:
#     - slug: argo-workflows                                   # also the OpenBao path + Authentik slug
#       redirectUri: https://argo.example.com/oauth2/callback
#       scopes: [openid, profile, email, groups]
apps: []
