# Filled in by the app-databases app (from argocd/values.yaml). Defaults are
# placeholders so the chart renders on its own with `helm template`.
#
# This chart owns the *stateful glue* for the platform stack so it can come up in
# one wave, before the components themselves:
#   - the namespaces every component lands in (so the platform controller can
#     publish each app's <app>-sso Secret into a namespace that already exists),
#   - one CloudNativePG Cluster per stateful component, with backups to the object
#     store (same shape as charts/authentik-db),
#   - the per-namespace ExternalSecrets that deliver object-storage keys and the
#     handful of OAuth/app secrets whose key names the upstream charts dictate.

# Shared CNPG knobs (passed in from argocd/values.yaml appDatabases.*).
instances: 1
storageSize: 8Gi
backup:
  enabled: true
  retention: "30d"
  schedule: "0 0 3 * * *"   # 03:00 daily - CNPG cron is 6 fields (seconds first)

# Object store the CNPG backups stream to (the in-cluster SeaweedFS by default).
s3:
  endpoint: http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333
  bucket: platform
# OpenBao KV path the object-store access/secret keys live at.
s3SecretPath: s3

# Every namespace a platform component runs in. Created here (wave 5) so the
# platform controller's SSOApplication Secrets land somewhere that exists.
namespaces:
  - monitoring        # kube-prometheus-stack (grafana/prometheus/alertmanager) + loki + tempo
  - uptime-kuma
  - forgejo
  - harbor
  - outline
  - windmill
  - superset
  - vaultwarden
  - open-webui
  - litellm
  - adomi-platform-management

# One CloudNativePG Cluster per stateful component. CNPG generates the owner
# password into <name>-app; the component reads <name>-rw + that Secret. Backups
# stream to s3://<bucket>/<name>, authenticated by the <name>-backup ExternalSecret.
databases:
  - { name: forgejo-db,    namespace: forgejo,     database: forgejo,    owner: forgejo }
  - { name: harbor-db,     namespace: harbor,      database: harbor,     owner: harbor }
  - { name: management-db, namespace: adomi-platform-management, database: odoo, owner: odoo }
  - { name: outline-db,    namespace: outline,     database: outline,    owner: outline }
  # Windmill's migrations grant to windmill_admin / windmill_user but its non-superuser
  # owner can't create them, so CNPG seeds the roles and grants them to the owner here.
  - name: windmill-db
    namespace: windmill
    database: windmill
    owner: windmill
    initSQL:
      - CREATE ROLE windmill_user
      - CREATE ROLE windmill_admin WITH BYPASSRLS
      - GRANT windmill_user TO windmill_admin
      - GRANT windmill_admin TO windmill
      - GRANT windmill_user TO windmill
  - { name: superset-db,   namespace: superset,    database: superset,   owner: superset }
  - { name: vaultwarden-db, namespace: vaultwarden, database: vaultwarden, owner: vaultwarden }
  - { name: openwebui-db,  namespace: open-webui,  database: openwebui,  owner: openwebui }
  - { name: litellm-db,    namespace: litellm,     database: litellm,    owner: litellm }

# Generic ExternalSecrets: read a property out of an OpenBao KV path and write it
# under the exact Secret key name the consuming chart expects. Covers
# object-storage creds, the Forgejo OAuth key remap, and Outline's boot secrets.
externalSecrets:
  # Loki / Tempo authenticate to S3 from standard AWS env vars (extraEnvFrom).
  - name: loki-s3
    namespace: monitoring
    openbaoPath: s3
    data:
      - { secretKey: AWS_ACCESS_KEY_ID,     property: access-key }
      - { secretKey: AWS_SECRET_ACCESS_KEY, property: secret-key }
  - name: tempo-s3
    namespace: monitoring
    openbaoPath: s3
    data:
      - { secretKey: AWS_ACCESS_KEY_ID,     property: access-key }
      - { secretKey: AWS_SECRET_ACCESS_KEY, property: secret-key }
  # Harbor's registry-storage existingSecret dictates these exact key names.
  - name: harbor-s3
    namespace: harbor
    openbaoPath: s3
    data:
      - { secretKey: REGISTRY_STORAGE_S3_ACCESSKEY, property: access-key }
      - { secretKey: REGISTRY_STORAGE_S3_SECRETKEY, property: secret-key }
  # Outline's fileStorage.s3.existingSecret expects access-key-id / secret-access-key.
  - name: outline-s3
    namespace: outline
    openbaoPath: s3
    data:
      - { secretKey: access-key-id,     property: access-key }
      - { secretKey: secret-access-key, property: secret-key }
  # Argo CD OIDC: the controller writes client-id/client-secret to secret/argocd.
  # Argo CD resolves $argocd-sso:client-id / :client-secret from a Secret carrying
  # the part-of label, and hot-reloads when it appears (it's installed before
  # Authentik, so SSO stays dormant until then; local admin remains break-glass).
  - name: argocd-sso
    namespace: argocd
    openbaoPath: argocd
    labels:
      app.kubernetes.io/part-of: argocd
    data:
      - { secretKey: client-id,     property: client-id }
      - { secretKey: client-secret, property: client-secret }
  # The platform controller writes client-id/client-secret to OpenBao secret/forgejo;
  # Forgejo's oauth init job wants a Secret with keys named key / secret.
  - name: forgejo-oauth
    namespace: forgejo
    openbaoPath: forgejo
    data:
      - { secretKey: key,    property: client-id }
      - { secretKey: secret, property: client-secret }
  # Forgejo's local admin (real user auth is Authentik forward-auth; this account
  # exists only so openbao-bootstrap can mint the per-customer GitOps service token
  # in-cluster). Random password from OpenBao + a fixed username; consumed by the
  # chart's gitea.admin.existingSecret (keys username / password).
  - name: forgejo-admin
    namespace: forgejo
    openbaoPath: forgejo-admin
    literals:
      username: adomi-admin
    data:
      - { secretKey: password, property: password }
  # Grafana's local admin: random password from OpenBao + a fixed admin username.
  - name: grafana-admin
    namespace: monitoring
    openbaoPath: grafana-admin
    literals:
      admin-user: admin
    data:
      - { secretKey: admin-password, property: admin-password }
  # Superset's SUPERSET_SECRET_KEY (required to boot), generated by openbao-bootstrap.
  - name: superset-secret
    namespace: superset
    openbaoPath: superset-app
    data:
      - { secretKey: secret-key, property: secret-key }
  # LiteLLM proxy master key (stable, so it isn't regenerated on every sync).
  - name: litellm-masterkey
    namespace: litellm
    openbaoPath: litellm-app
    data:
      - { secretKey: masterkey, property: masterkey }
  # Harbor's admin password (off the well-known default), seeded by openbao-bootstrap.
  - name: harbor-admin
    namespace: harbor
    openbaoPath: harbor-app
    data:
      - { secretKey: admin-password, property: admin-password }
  # Odoo management portal master/admin password, generated once by openbao-bootstrap.
  - name: management-admin
    namespace: adomi-platform-management
    openbaoPath: management-app
    data:
      - { secretKey: admin-password, property: admin-password }
  # Shared bearer token for controller -> portal status pushes. The controller
  # reads the token straight from OpenBao (secret/adomi-ingest); the portal can't
  # reach OpenBao, so deliver it here as the Secret it mounts as ADOMI_INGEST_TOKEN.
  # Generated once by openbao-bootstrap at secret/adomi-ingest.
  - name: adomi-ingest
    namespace: adomi-platform-management
    openbaoPath: adomi-ingest
    data:
      - { secretKey: token, property: token }
  # Outline's SECRET_KEY / UTILS_SECRET, generated once by openbao-bootstrap.
  - name: outline-secret
    namespace: outline
    openbaoPath: outline-app
    data:
      - { secretKey: secret-key,   property: secret-key }
      - { secretKey: utils-secret, property: utils-secret }
  # Outline OAuth: Outline's chart can't source the OIDC client-id from a Secret,
  # but its deployment loads extraSecretNamesForEnvFrom via envFrom. The controller
  # writes client-id/client-secret to secret/outline; expose them as the env var
  # names Outline reads so envFrom overrides the chart's blank values.
  - name: outline-oidc
    namespace: outline
    openbaoPath: outline
    data:
      - { secretKey: OIDC_CLIENT_ID,     property: client-id }
      - { secretKey: OIDC_CLIENT_SECRET, property: client-secret }
