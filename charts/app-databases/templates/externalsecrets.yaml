# Generic ExternalSecrets: read a property from an OpenBao KV path and write it
# under the exact Secret key name a consuming chart expects. Used for
# object-storage credentials, the Forgejo OAuth key remap, and Outline's boot
# secrets. (CNPG backup credentials are rendered alongside each Cluster instead.)
{{- range $es := .Values.externalSecrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $es.name }}
  namespace: {{ $es.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: {{ $es.name }}
    creationPolicy: Owner
    {{- if or $es.literals $es.labels }}
    template:
      mergePolicy: Merge
      {{- if $es.labels }}
      # Labels on the produced Secret (e.g. so Argo CD will read it).
      metadata:
        labels:
          {{- range $k, $v := $es.labels }}
          {{ $k }}: {{ $v | quote }}
          {{- end }}
      {{- end }}
      {{- if $es.literals }}
      # Literal keys merged alongside the values pulled from OpenBao below.
      data:
        {{- range $k, $v := $es.literals }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  data:
    {{- range $es.data }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ $es.openbaoPath | quote }}
        property: {{ .property | quote }}
    {{- end }}
{{- end }}
