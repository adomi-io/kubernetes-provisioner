# The reconciler loop. Talks to OpenBao over its HTTP API (curl + jq) and stores
# unseal material in a Secret (kubectl). Safe to run forever and to re-run: it
# never re-initialises an initialised OpenBao and never overwrites a secret that
# already exists.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-bootstrap
data:
  bootstrap.sh: |
    #!/bin/sh
    set -u
    log() { echo "[openbao-bootstrap] $*"; }
    sec="openbao-keys"

    # seed_app_secret PATH KEY [KEY...] - generate a random hex value for each key
    # at the given KV path, but only if the path doesn't exist yet (idempotent, like
    # the Authentik/S3 seeds below). Used for app secrets that must be stable across
    # restarts and can't safely be regenerated by a chart on every sync.
    seed_app_secret() {
      p="$1"; shift
      [ -n "$p" ] || return 0
      code=$(curl -s -H "$TH" -o /dev/null -w '%{http_code}' "$BAO_ADDR/v1/$KV_MOUNT/data/$p")
      if [ "$code" = "200" ]; then log "secret/$p already present; leaving it"; return 0; fi
      d='{}'
      for k in "$@"; do
        v=$(openssl rand -hex 32 2>/dev/null || tr -dc 'a-f0-9' </dev/urandom | head -c 64)
        d=$(echo "$d" | jq -c --arg k "$k" --arg v "$v" '. + {($k):$v}')
      done
      curl -s -H "$TH" -X POST "$BAO_ADDR/v1/$KV_MOUNT/data/$p" -d "$(jq -n --argjson d "$d" '{data:$d}')" >/dev/null
      log "seeded secret/$p"
    }

    while :; do
      st=$(curl -s "$BAO_ADDR/v1/sys/seal-status" 2>/dev/null || true)
      [ -n "$st" ] || { log "waiting for OpenBao..."; sleep 10; continue; }

      # initialise once
      if [ "$(echo "$st" | jq -r .initialized)" != "true" ]; then
        log "initialising ($UNSEAL_MODE mode)"
        if [ "$UNSEAL_MODE" = "kubernetes" ]; then
          init=$(curl -s -X POST "$BAO_ADDR/v1/sys/init" -d '{"secret_shares":5,"secret_threshold":3}')
          kf='.keys_base64[]'
        else
          init=$(curl -s -X POST "$BAO_ADDR/v1/sys/init" -d '{"recovery_shares":5,"recovery_threshold":3}')
          kf='.recovery_keys_base64[]'
        fi
        rt=$(echo "$init" | jq -r .root_token)
        [ -n "$rt" ] && [ "$rt" != "null" ] || { log "init failed: $init"; sleep 10; continue; }
        set -- --from-literal=root-token="$rt"
        i=0
        for k in $(echo "$init" | jq -r "$kf"); do set -- "$@" --from-literal=key-$i="$k"; i=$((i+1)); done
        kubectl -n "$POD_NAMESPACE" create secret generic "$sec" "$@" --dry-run=client -o yaml | kubectl apply -f - >/dev/null
        log "stored unseal material in secret/$sec"
      fi

      # recover the root token from the Secret
      rt=$(kubectl -n "$POD_NAMESPACE" get secret "$sec" -o jsonpath='{.data.root-token}' 2>/dev/null | base64 -d 2>/dev/null || true)
      [ -n "$rt" ] || { log "no stored root token yet"; sleep 10; continue; }

      # unseal (self-managed mode only; KMS auto-unseals)
      if [ "$UNSEAL_MODE" = "kubernetes" ]; then
        i=0
        while [ "$(curl -s "$BAO_ADDR/v1/sys/seal-status" | jq -r .sealed)" = "true" ] && [ "$i" -lt 3 ]; do
          k=$(kubectl -n "$POD_NAMESPACE" get secret "$sec" -o jsonpath="{.data.key-$i}" 2>/dev/null | base64 -d 2>/dev/null || true)
          [ -n "$k" ] && curl -s -X PUT "$BAO_ADDR/v1/sys/unseal" -d "$(jq -n --arg k "$k" '{key:$k}')" >/dev/null
          i=$((i+1))
        done
      fi

      [ "$(curl -s "$BAO_ADDR/v1/sys/seal-status" | jq -r .sealed)" = "false" ] || { log "still sealed; retrying"; sleep 15; continue; }

      # configure (all idempotent)
      TH="X-Vault-Token: $rt"
      curl -s -H "$TH" -X POST "$BAO_ADDR/v1/sys/mounts/$KV_MOUNT" -d '{"type":"kv","options":{"version":"2"}}' >/dev/null
      curl -s -H "$TH" -X POST "$BAO_ADDR/v1/sys/auth/$K8S_MOUNT" -d '{"type":"kubernetes"}' >/dev/null
      curl -s -H "$TH" -X POST "$BAO_ADDR/v1/auth/$K8S_MOUNT/config" -d '{"kubernetes_host":"https://kubernetes.default.svc"}' >/dev/null
      pol=$(printf 'path "%s/data/*" { capabilities = ["read"] }\npath "%s/metadata/*" { capabilities = ["read"] }' "$KV_MOUNT" "$KV_MOUNT")
      curl -s -H "$TH" -X PUT "$BAO_ADDR/v1/sys/policies/acl/external-secrets" -d "$(jq -n --arg p "$pol" '{policy:$p}')" >/dev/null
      curl -s -H "$TH" -X POST "$BAO_ADDR/v1/auth/$K8S_MOUNT/role/$K8S_ROLE" \
        -d '{"bound_service_account_names":"external-secrets","bound_service_account_namespaces":"external-secrets","policies":"external-secrets","ttl":"1h"}' >/dev/null

      # adomi-platform-controller: read the Authentik token, read/write the app
      # credential paths it manages. The exact-match authentik rule keeps that
      # secret read-only while the glob allows writing per-app credentials. Bound
      # to the controller's ServiceAccount so it authenticates with no static token.
      if [ -n "${CONTROLLER_ROLE:-}" ]; then
        cpol=$(printf 'path "%s/data/%s" { capabilities = ["read"] }\npath "%s/data/*" { capabilities = ["create","read","update"] }' "$KV_MOUNT" "$AUTHENTIK_PATH" "$KV_MOUNT")
        curl -s -H "$TH" -X PUT "$BAO_ADDR/v1/sys/policies/acl/$CONTROLLER_ROLE" -d "$(jq -n --arg p "$cpol" '{policy:$p}')" >/dev/null
        curl -s -H "$TH" -X POST "$BAO_ADDR/v1/auth/$K8S_MOUNT/role/$CONTROLLER_ROLE" \
          -d "$(jq -n --arg sa "$CONTROLLER_SA" --arg ns "$CONTROLLER_NS" --arg pol "$CONTROLLER_ROLE" \
            '{bound_service_account_names:$sa, bound_service_account_namespaces:$ns, policies:$pol, ttl:"1h"}')" >/dev/null
      fi

      # seed Authentik's secret_key, only if it isn't already there. (The database
      # password isn't here - CloudNativePG manages Authentik's Postgres creds.)
      code=$(curl -s -H "$TH" -o /dev/null -w '%{http_code}' "$BAO_ADDR/v1/$KV_MOUNT/data/$AUTHENTIK_PATH")
      if [ "$code" = "200" ]; then
        log "secret/$AUTHENTIK_PATH already present; leaving it"
      else
        sk=$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 64)
        curl -s -H "$TH" -X POST "$BAO_ADDR/v1/$KV_MOUNT/data/$AUTHENTIK_PATH" \
          -d "$(jq -n --arg sk "$sk" '{data:{secret_key:$sk}}')" >/dev/null
        log "seeded secret/$AUTHENTIK_PATH"
      fi

      # Authentik also needs an API bootstrap token: it's fed in at first boot as
      # AUTHENTIK_BOOTSTRAP_TOKEN and reused by the adomi-platform-controller to call
      # the API. Add it without clobbering the rest of the secret; generate only if absent.
      cur=$(curl -s -H "$TH" "$BAO_ADDR/v1/$KV_MOUNT/data/$AUTHENTIK_PATH")
      if [ "$(echo "$cur" | jq -r '.data.data["bootstrap-token"] // empty')" = "" ]; then
        bt=$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 60)
        merged=$(echo "$cur" | jq -c --arg bt "$bt" '{data: ((.data.data // {}) + {"bootstrap-token":$bt})}')
        curl -s -H "$TH" -X POST "$BAO_ADDR/v1/$KV_MOUNT/data/$AUTHENTIK_PATH" -d "$merged" >/dev/null
        log "added bootstrap-token to secret/$AUTHENTIK_PATH"
      fi

      # seed S3 access/secret keys for the object store, only if absent
      code=$(curl -s -H "$TH" -o /dev/null -w '%{http_code}' "$BAO_ADDR/v1/$KV_MOUNT/data/$S3_PATH")
      if [ "$code" = "200" ]; then
        log "secret/$S3_PATH already present; leaving it"
      else
        ak=$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 20)
        sk=$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 40)
        curl -s -H "$TH" -X POST "$BAO_ADDR/v1/$KV_MOUNT/data/$S3_PATH" \
          -d "$(jq -n --arg ak "$ak" --arg sk "$sk" '{data:{"access-key":$ak,"secret-key":$sk}}')" >/dev/null
        log "seeded secret/$S3_PATH"
      fi

      # Seed stable app secrets that components need to boot and must not be
      # regenerated on every sync (Outline's SECRET_KEY/UTILS_SECRET, Odoo's master
      # password, Grafana's admin password, Superset's secret key, ...). APP_SECRETS
      # is a space-separated list of "path:key1,key2" entries; each is generated once,
      # only if absent, kept separate from any controller-managed OAuth path.
      for entry in ${APP_SECRETS:-}; do
        p=${entry%%:*}
        keys=$(echo "${entry#*:}" | tr ',' ' ')
        seed_app_secret "$p" $keys
      done

      # Mint the Forgejo service-account API token for the per-customer GitOps flow.
      # Unlike the seeds above this can't be a random value - it must be a real
      # Forgejo token - so we log in as the local admin (password from FORGEJO_ADMIN_PATH,
      # seeded above and delivered to Forgejo by cluster-secrets), ensure the client
      # org exists, mint a scoped token, and store {username, token} at FORGEJO_SCM_PATH
      # where cluster-secrets reads it. Idempotent: skipped once the path holds a token.
      # Forgejo comes up after this app, so early iterations just retry until it's ready.
      if [ -n "${FORGEJO_ADDR:-}" ]; then
        tok=""
        code=$(curl -s -H "$TH" -o /dev/null -w '%{http_code}' "$BAO_ADDR/v1/$KV_MOUNT/data/$FORGEJO_SCM_PATH")
        [ "$code" = "200" ] && tok=$(curl -s -H "$TH" "$BAO_ADDR/v1/$KV_MOUNT/data/$FORGEJO_SCM_PATH" | jq -r '.data.data.token // empty')
        if [ -n "$tok" ]; then
          log "secret/$FORGEJO_SCM_PATH already has a token; leaving it"
        else
          apw=$(curl -s -H "$TH" "$BAO_ADDR/v1/$KV_MOUNT/data/$FORGEJO_ADMIN_PATH" | jq -r '.data.data.password // empty')
          au=$(curl -s -o /dev/null -w '%{http_code}' -u "$FORGEJO_ADMIN_USER:$apw" "$FORGEJO_ADDR/api/v1/user")
          if [ -z "$apw" ]; then
            log "forgejo admin password not seeded yet; will retry"
          elif [ "$au" != "200" ]; then
            log "forgejo admin not ready (HTTP $au); will retry"
          else
            # Ensure the client org exists (409 if it already does - harmless).
            curl -s -H 'Content-Type: application/json' -u "$FORGEJO_ADMIN_USER:$apw" \
              -X POST "$FORGEJO_ADDR/api/v1/orgs" \
              -d "$(jq -n --arg u "$FORGEJO_ORG" '{username:$u,visibility:"private"}')" >/dev/null
            # OpenBao is the source of truth; drop any orphaned same-named token first
            # so a re-mint after the OpenBao value was lost doesn't 400 on "exists".
            curl -s -u "$FORGEJO_ADMIN_USER:$apw" \
              -X DELETE "$FORGEJO_ADDR/api/v1/users/$FORGEJO_ADMIN_USER/tokens/adomi-scm" >/dev/null
            resp=$(curl -s -H 'Content-Type: application/json' -u "$FORGEJO_ADMIN_USER:$apw" \
              -X POST "$FORGEJO_ADDR/api/v1/users/$FORGEJO_ADMIN_USER/tokens" \
              -d '{"name":"adomi-scm","scopes":["write:organization","write:repository","read:user","read:issue"]}')
            new=$(echo "$resp" | jq -r '.sha1 // empty')
            if [ -n "$new" ]; then
              curl -s -H "$TH" -X POST "$BAO_ADDR/v1/$KV_MOUNT/data/$FORGEJO_SCM_PATH" \
                -d "$(jq -n --arg u "$FORGEJO_ADMIN_USER" --arg t "$new" '{data:{username:$u,token:$t}}')" >/dev/null
              log "minted Forgejo token and stored it at secret/$FORGEJO_SCM_PATH"
            else
              log "forgejo token mint failed: $resp"
            fi
          fi
        fi

        # Staff access to the (private) client org: ensure a read-only "staff"
        # team covering every repo and keep membership synced from
        # FORGEJO_STAFF_USERS. Repos and the org stay private - this team is the
        # only viewing grant. Runs every loop so new staff logins (auto-registered
        # by the Authentik reverse-proxy auth) get picked up within a minute.
        if [ -n "${FORGEJO_STAFF_USERS:-}" ]; then
          apw=$(curl -s -H "$TH" "$BAO_ADDR/v1/$KV_MOUNT/data/$FORGEJO_ADMIN_PATH" | jq -r '.data.data.password // empty')
          if [ -n "$apw" ]; then
            tid=$(curl -s -u "$FORGEJO_ADMIN_USER:$apw" "$FORGEJO_ADDR/api/v1/orgs/$FORGEJO_ORG/teams" | jq -r '.[] | select(.name=="staff") | .id' 2>/dev/null)
            if [ -z "$tid" ]; then
              tid=$(curl -s -H 'Content-Type: application/json' -u "$FORGEJO_ADMIN_USER:$apw" \
                -X POST "$FORGEJO_ADDR/api/v1/orgs/$FORGEJO_ORG/teams" \
                -d '{"name":"staff","description":"Platform staff: read access to every client repo.","permission":"read","includes_all_repositories":true,"units":["repo.code","repo.pulls","repo.issues","repo.releases","repo.wiki"]}' | jq -r '.id // empty')
              [ -n "$tid" ] && log "created staff team ($tid) in org $FORGEJO_ORG"
            fi
            if [ -n "$tid" ]; then
              for u in $FORGEJO_STAFF_USERS; do
                curl -s -o /dev/null -u "$FORGEJO_ADMIN_USER:$apw" -X PUT "$FORGEJO_ADDR/api/v1/teams/$tid/members/$u"
              done
            fi
          fi
        fi
      fi

      log "reconciled OK"
      sleep 60
    done
