# Runs the reconciler loop. One replica is enough - it just keeps OpenBao
# initialised, unsealed, configured, and seeded.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao-bootstrap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbao-bootstrap
  template:
    metadata:
      labels:
        app: openbao-bootstrap
    spec:
      serviceAccountName: openbao-bootstrap
      containers:
        - name: reconciler
          image: {{ .Values.image | quote }}
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: BAO_ADDR
              value: {{ .Values.baoAddr | quote }}
            - name: UNSEAL_MODE
              value: {{ .Values.unsealMode | quote }}
            - name: KV_MOUNT
              value: {{ .Values.kvMount | quote }}
            - name: K8S_MOUNT
              value: {{ .Values.kubernetesAuthMountPath | quote }}
            - name: K8S_ROLE
              value: {{ .Values.kubernetesAuthRole | quote }}
            - name: AUTHENTIK_PATH
              value: {{ .Values.authentikSecretPath | quote }}
            - name: S3_PATH
              value: {{ .Values.s3SecretPath | quote }}
            - name: APP_SECRETS
              value: {{ .Values.appSecrets | quote }}
            - name: CONTROLLER_ROLE
              value: {{ .Values.controllerRole | quote }}
            - name: CONTROLLER_SA
              value: {{ .Values.controllerServiceAccount | quote }}
            - name: CONTROLLER_NS
              value: {{ .Values.controllerNamespace | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.forgejoMint.enabled }}
            - name: FORGEJO_ADDR
              value: {{ .Values.forgejoMint.addr | quote }}
            - name: FORGEJO_ORG
              value: {{ .Values.forgejoMint.org | quote }}
            - name: FORGEJO_ADMIN_PATH
              value: {{ .Values.forgejoMint.adminPath | quote }}
            - name: FORGEJO_ADMIN_USER
              value: {{ .Values.forgejoMint.adminUser | quote }}
            - name: FORGEJO_SCM_PATH
              value: {{ .Values.forgejoMint.scmPath | quote }}
            - name: FORGEJO_STAFF_USERS
              value: {{ join " " (.Values.forgejoMint.staffUsers | default list) | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: openbao-bootstrap
