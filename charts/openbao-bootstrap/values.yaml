# Filled in by the openbao-bootstrap app (from argocd/values.yaml). Defaults are
# placeholders so the chart renders on its own.

# Image needs curl, jq, and kubectl - alpine/k8s ships all three.
image: alpine/k8s:1.31.4

baoAddr: http://openbao.openbao.svc.cluster.local:8200
unsealMode: kubernetes     # "kubernetes" (self-managed) or "kms" (auto-unseal via cloud KMS)
kvMount: secret
kubernetesAuthMountPath: kubernetes
kubernetesAuthRole: external-secrets
authentikSecretPath: authentik
s3SecretPath: s3
# Stable app secrets to generate once (only if absent), as a space-separated list
# of "path:key1,key2" entries. Kept on dedicated paths, separate from any
# controller-managed OAuth credentials.
appSecrets: "outline-app:secret-key,utils-secret odoo-app:admin-password grafana-admin:admin-password superset-app:secret-key harbor-app:admin-password litellm-app:masterkey"

# adomi-platform-controller: a kubernetes-auth role + write policy so the platform
# controller can authenticate as itself (no static token) to read the Authentik
# token and read/write the app credential paths it manages. Must match the
# controller's ServiceAccount name and namespace.
controllerRole: adomi-platform-controller
controllerServiceAccount: adomi-platform-controller
controllerNamespace: adomi-system
