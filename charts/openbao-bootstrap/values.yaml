# Filled in by the openbao-bootstrap app (from argocd/values.yaml). Defaults are
# placeholders so the chart renders on its own.

# Image needs curl, jq, and kubectl - alpine/k8s ships all three.
image: alpine/k8s:1.31.4

baoAddr: http://openbao.openbao.svc.cluster.local:8200
unsealMode: kubernetes     # "kubernetes" (self-managed) or "kms" (auto-unseal via cloud KMS)
kvMount: secret
kubernetesAuthMountPath: kubernetes
kubernetesAuthRole: external-secrets
authentikSecretPath: authentik
s3SecretPath: s3
# Stable app secrets to generate once (only if absent), as a space-separated list
# of "path:key1,key2" entries. Kept on dedicated paths, separate from any
# controller-managed OAuth credentials.
appSecrets: "outline-app:secret-key,utils-secret grafana-admin:admin-password harbor-app:admin-password litellm-app:masterkey management-app:admin-password adomi-ingest:token"

# adomi-platform-controller: a kubernetes-auth role + write policy so the platform
# controller can authenticate as itself (no static token) to read the Authentik
# token and read/write the app credential paths it manages. Must match the
# controller's ServiceAccount name and namespace.
controllerRole: adomi-platform-controller
controllerServiceAccount: adomi-platform-controller
controllerNamespace: adomi-system

# Forgejo service-account token minting (per-customer GitOps). When enabled, the
# reconciler logs in to Forgejo with the local admin (password at adminPath, also
# delivered to Forgejo's admin-init job by cluster-secrets), ensures the client org
# exists, mints a scoped API token, and writes {username, token} to scmPath in
# OpenBao - the credential Argo CD and the platform API use to read/write client
# repos. Idempotent: skipped once scmPath already holds a token. Self-heals if the
# OpenBao value is lost but a same-named Forgejo token still lingers.
forgejoMint:
  enabled: false
  addr: ""                    # in-cluster Forgejo API base URL
  org: clients                # org the client repos live under (created if absent)
  adminPath: forgejo-admin    # OpenBao path with the admin `password`
  adminUser: adomi-admin      # local admin username (owner of the minted token)
  scmPath: forgejo-scm        # OpenBao path to write {username, token} to
  # Forgejo usernames granted read access to every client repo via the org's
  # "staff" team (reconciled each loop). Users auto-register on first visit
  # through the Authentik reverse-proxy auth; add them here after that.
  staffUsers: []
