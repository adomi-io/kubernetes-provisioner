{{- if .Values.client }}
# The customer's root Application: syncs their committed intent (Client/Environment/
# Application/Snapshot, catalog overlay) into adomi-client-<client>. The platform
# controller then reconciles those CRs into running workloads. The intent namespace
# itself comes from this chart (namespace.yaml, client-admin project) — the client
# project forbids cluster-scoped resources, so no CreateNamespace here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: client-{{ .Values.client }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: client-{{ .Values.client }}
  source:
    repoURL: {{ .Values.repoURL | quote }}
    targetRevision: {{ .Values.targetRevision | quote }}
    path: .
    directory:
      recurse: true
      include: {{ .Values.includeGlobs | quote }}
  destination:
    server: {{ .Values.destinationServer | quote }}
    namespace: {{ .Values.clientNamespacePrefix }}{{ .Values.client }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1
      backoff:
        duration: 10s
        maxDuration: 3m
{{- end }}
