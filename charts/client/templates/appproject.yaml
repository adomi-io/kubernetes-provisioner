{{- if not .Values.client }}{{ fail "client chart requires .Values.client" }}{{- else }}
# AppProject fencing customer {{ .Values.client }}: only their client repo, only
# their namespaces, only the platform CRD kinds. This is the per-client isolation
# boundary — a compromised/edited client repo cannot escape it.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: client-{{ .Values.client }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Client {{ .Values.client }}
  sourceRepos:
    - {{ .Values.repoURL | quote }}
  destinations:
    - server: {{ .Values.destinationServer | quote }}
      namespace: {{ .Values.clientNamespacePrefix }}{{ .Values.client }}
    - server: {{ .Values.destinationServer | quote }}
      namespace: {{ .Values.client }}-*
  # No cluster-scoped resources may come from a client repo.
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    {{- range .Values.allowedGroups }}
    - group: {{ . | quote }}
      kind: "*"
    {{- end }}
{{- end }}
