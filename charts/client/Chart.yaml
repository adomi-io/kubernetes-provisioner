apiVersion: v2
name: client
description: >-
  Per-customer GitOps bootstrap: an Argo CD AppProject that fences a customer's
  client repo to its own namespaces + the platform CRD kinds, plus the root
  Application that syncs that repo's intent (Client/Workspace/Application/Snapshot)
  into the cluster. One release per customer, generated by the `clients`
  ApplicationSet from the Forgejo `clients` org.
type: application
version: 0.1.0
appVersion: "1.0"
maintainers:
  - name: Adomi Software, LLC
    email: github@adomisoftware.com
