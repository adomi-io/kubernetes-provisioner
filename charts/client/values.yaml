# Per-customer client bootstrap. The `clients` ApplicationSet fills client/repoURL
# in per discovered repo; the rest default here so the chart renders standalone.

# Customer slug (== Forgejo repo name == Client CR slug). Required in real use.
client: ""

# Clone URL of the customer's client repo in Forgejo.
repoURL: ""
# Branch/tag Argo CD tracks for the client repo.
targetRevision: main

# Destination cluster (in-cluster by default).
destinationServer: https://kubernetes.default.svc

# Namespace holding the customer's committed CRs (must match the Odoo addon's
# adomi_platform.client_namespace_prefix). Workspace workloads land in <client>-*.
clientNamespacePrefix: adomi-client-

# Only these directories of the client repo are synced (keeps READMEs/CI out).
# Must match the resource plurals the platform API commits (adomi_platform_schema
# BY_PLURAL): clients, domains, databaseservers, databases, environments, applications,
# gitrepositories, snapshots, plus the client catalog overlay. A plural missing here
# means the API commits the manifest but Argo CD never applies it — the record sits
# at "waiting for the platform to apply it" forever.
includeGlobs: "{clients/*.yaml,domains/*.yaml,databaseservers/*.yaml,databases/*.yaml,environments/*.yaml,applications/*.yaml,gitrepositories/*.yaml,snapshots/*.yaml,catalog/*.yaml}"

# The AppProject the per-customer root Application is placed in is named
# client-<client>. It permits only the platform CRD kinds, scoped to the customer's
# namespaces — a client repo cannot create arbitrary or cluster-scoped resources.
allowedGroups:
  - platform.adomi.io
  - identity.adomi.io
