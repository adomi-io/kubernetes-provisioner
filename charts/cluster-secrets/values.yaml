# Filled in by the cluster-secrets app (from argocd/values.yaml). These defaults
# are just placeholders so the chart renders on its own.
openbao:
  address: http://openbao.openbao.svc.cluster.local:8200
  kvMount: secret
  kubernetesAuthMountPath: kubernetes
  kubernetesAuthRole: external-secrets
  authentikSecretPath: authentik
  argoWorkflowsSecretPath: argo-workflows
  forgejoSecretPath: forgejo
s3SecretPath: s3

# Per-customer GitOps. When enabled, deliver the Forgejo service-account token to
# Argo CD (SCM generator + repo creds) so it can discover and clone client repos.
clients:
  enabled: true
  forgejoCloneBase: http://forgejo-http.forgejo.svc.cluster.local:3000/clients