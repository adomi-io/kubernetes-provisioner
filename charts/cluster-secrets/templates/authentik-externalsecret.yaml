# Pulls authentik's secrets out of OpenBao into a normal Secret (authentik-secrets)
# that the authentik app then reads.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: authentik-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: {{ .Values.openbao.authentikSecretPath | quote }}
        property: secret_key
    - secretKey: postgres-password
      remoteRef:
        key: {{ .Values.openbao.authentikSecretPath | quote }}
        property: postgres-password
    # API token for the authentik-registrar. Authentik reads it at first boot as
    # AUTHENTIK_BOOTSTRAP_TOKEN (openbao-bootstrap seeds it into the same path).
    - secretKey: bootstrap-token
      remoteRef:
        key: {{ .Values.openbao.authentikSecretPath | quote }}
        property: bootstrap-token