{{- if .Values.tenants.enabled }}
# Secrets for the producer API flow:
#   1. adomi-platform-api (adomi-system) — the API's own bearer token (api-token,
#      generated once by openbao-bootstrap) + the Forgejo service-account token it
#      writes with (forgejo-token, from secret/{{ .Values.openbao.forgejoSecretPath }}).
#   2. adomi-platform-api (adomi-platform-management) — the same bearer token the Odoo
#      portal presents when calling the API (ADOMI_PLATFORM_API_TOKEN).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adomi-platform-api
  namespace: adomi-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: adomi-platform-api
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: adomi-platform-api
        property: api-token
    - secretKey: forgejo-token
      remoteRef:
        key: {{ .Values.openbao.forgejoSecretPath | quote }}
        property: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adomi-platform-api
  namespace: adomi-platform-management
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: adomi-platform-api
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: adomi-platform-api
        property: api-token
{{- end }}
