{{- if .Values.clients.enabled }}
# Forgejo service-account credentials for the per-customer GitOps flow, pulled from
# OpenBao ({{ .Values.openbao.forgejoSecretPath }}, properties `token`/`username`).
# Two consumers in the argocd namespace:
#   1. forgejo-scm-token  — the clients ApplicationSet's SCM (Gitea) generator.
#   2. forgejo-repo-creds — Argo CD repo credentials so it can clone client repos
#      over the in-cluster Service (the public ingress is gated by forward-auth).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-scm-token
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: forgejo-scm-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.openbao.forgejoSecretPath | quote }}
        property: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-repo-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: forgejo-repo-creds
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: git
        # URL prefix matched against every client repo Argo CD clones.
        url: {{ .Values.clients.forgejoCloneBase | quote }}
        username: "{{ `{{ .username }}` }}"
        password: "{{ `{{ .token }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.openbao.forgejoSecretPath | quote }}
        property: username
    - secretKey: token
      remoteRef:
        key: {{ .Values.openbao.forgejoSecretPath | quote }}
        property: token
{{- end }}
