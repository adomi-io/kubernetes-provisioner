# The cluster-wide connection to your OpenBao. External Secrets logs in with its
# own Kubernetes identity, so there is no token to store anywhere. Your OpenBao
# needs its Kubernetes auth turned on, a role tied to the external-secrets account,
# and read access to the secret paths - the README walks through it.
#
# OpenBao is API-compatible with HashiCorp Vault, so we use External Secrets' vault
# provider and point it at the OpenBao server.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: {{ .Values.openbao.address | quote }}
      path: {{ .Values.openbao.kvMount | quote }}
      version: v2
      auth:
        kubernetes:
          mountPath: {{ .Values.openbao.kubernetesAuthMountPath | quote }}
          role: {{ .Values.openbao.kubernetesAuthRole | quote }}
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets