# S3 credentials CloudNativePG uses to archive WAL + push base backups for
# authentik-db. Pulled from the same OpenBao path as the object store's own keys,
# into the authentik namespace where the Cluster lives.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-db-backup
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: authentik-db-backup
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef:
        key: {{ .Values.s3SecretPath | quote }}
        property: access-key
    - secretKey: secret-key
      remoteRef:
        key: {{ .Values.s3SecretPath | quote }}
        property: secret-key
