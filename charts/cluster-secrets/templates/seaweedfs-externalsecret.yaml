# Creates the seaweedfs namespace and the seaweedfs-s3-config Secret that the S3
# gateway authenticates with, built from the access/secret keys in OpenBao. The
# inner {{ "{{" }} .accessKey {{ "}}" }} is left for External Secrets to fill in, not Helm.
apiVersion: v1
kind: Namespace
metadata:
  name: seaweedfs
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-config
  namespace: seaweedfs
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: seaweedfs-s3-config
    creationPolicy: Owner
    template:
      data:
        seaweedfs_s3_config: |
          {{ `{"identities":[{"name":"platform","credentials":[{"accessKey":"{{ .accessKey }}","secretKey":"{{ .secretKey }}"}],"actions":["Admin"]}]}` }}
  data:
    - secretKey: accessKey
      remoteRef:
        key: {{ .Values.s3SecretPath | quote }}
        property: access-key
    - secretKey: secretKey
      remoteRef:
        key: {{ .Values.s3SecretPath | quote }}
        property: secret-key
