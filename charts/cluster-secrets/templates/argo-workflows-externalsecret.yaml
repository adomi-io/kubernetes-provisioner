{{- if .Values.argoWorkflowsSso }}
# Pulls Argo Workflows' SSO client credentials out of OpenBao into the
# argo-workflows-sso Secret that the server reads to log people in.
#
# We also create the argo namespace here. Argo Workflows itself comes up later
# (wave 2), but the Secret needs a home now (wave 1), so we make the namespace
# first. Delete=false leaves it alone if this app is ever removed.
apiVersion: v1
kind: Namespace
metadata:
  name: argo
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argo-workflows-sso
  namespace: argo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: argo-workflows-sso
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: {{ .Values.openbao.argoWorkflowsSecretPath | quote }}
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.openbao.argoWorkflowsSecretPath | quote }}
        property: client-secret
{{- end }}
