{{- if .Values.client }}
# The customer's root Application: syncs their committed intent (Client/Workspace/
# Application/Snapshot, catalog overlay) into adomi-tenant-<client>. The platform
# controller then reconciles those CRs into running workloads.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-{{ .Values.client }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: client-{{ .Values.client }}
  source:
    repoURL: {{ .Values.repoURL | quote }}
    targetRevision: {{ .Values.targetRevision | quote }}
    path: .
    directory:
      recurse: true
      include: {{ .Values.includeGlobs | quote }}
  destination:
    server: {{ .Values.destinationServer | quote }}
    namespace: {{ .Values.tenantNamespacePrefix }}{{ .Values.client }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
