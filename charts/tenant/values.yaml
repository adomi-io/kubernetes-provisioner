# Per-customer tenant bootstrap. The `tenants` ApplicationSet fills client/repoURL
# in per discovered repo; the rest default here so the chart renders standalone.

# Customer slug (== Forgejo repo name == Client CR slug). Required in real use.
client: ""

# Clone URL of the customer's tenant repo in Forgejo.
repoURL: ""
# Branch/tag Argo CD tracks for the tenant repo.
targetRevision: main

# Destination cluster (in-cluster by default).
destinationServer: https://kubernetes.default.svc

# Namespace holding the customer's committed CRs (must match the Odoo addon's
# adomi_platform.tenant_namespace_prefix). Workspace workloads land in <client>-*.
tenantNamespacePrefix: adomi-tenant-

# Only these directories of the tenant repo are synced (keeps READMEs/CI out).
# Must match the resource plurals the platform API commits (adomi_platform_schema
# BY_PLURAL): clients, domains, databases, workspaces, applications, gitrepositories,
# snapshots, plus the tenant catalog overlay.
includeGlobs: "{clients/*.yaml,domains/*.yaml,databases/*.yaml,workspaces/*.yaml,applications/*.yaml,gitrepositories/*.yaml,snapshots/*.yaml,catalog/*.yaml}"

# The AppProject the per-customer root Application is placed in is named
# client-<client>. It permits only the platform CRD kinds, scoped to the customer's
# namespaces — a tenant repo cannot create arbitrary or cluster-scoped resources.
allowedGroups:
  - platform.adomi.io
  - identity.adomi.io
